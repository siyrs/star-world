name: Bounded catalog rebuild quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: bounded-catalog-rebuild-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    uses: ./.github/workflows/reusable-godot-quality-gate.yml
    with:
      domain_job_name: Independent catalog write budget, progressive convergence and adjacent persistence regressions
      domain_timeout_minutes: 55
      static_validators: |
        tests/developer_b/validate_bounded_catalog_rebuild.ps1
        tests/developer_b/validate_bounded_multi_world_recovery.ps1
        tests/developer_b/validate_world_catalog.ps1
        tests/developer_b/validate_save_recovery.ps1
        tests/developer_b/validate_runtime_health_report.ps1
        tests/developer_b/validate_reusable_ci_workflows.ps1
      primary_headless_script: res://tests/qa/bounded_catalog_rebuild_regression.gd
      primary_headless_output_base: build\bounded-catalog-rebuild-regression
      primary_headless_timeout_milliseconds: 480000
      domain_scripts: |
        res://tests/qa/bounded_multi_world_recovery_regression.gd
        res://tests/qa/world_catalog_regression.gd
        res://tests/qa/save_recovery_regression.gd
        res://tests/qa/runtime_health_report_policy_regression.gd
        res://tests/qa/runtime_health_report_regression.gd
        res://tests/qa/integration_regression.gd
        res://tests/qa/runtime_stability_regression.gd
      domain_artifact_name: bounded-catalog-rebuild-domain
      domain_artifact_paths: |
        build/reusable-ci-static-validators.log
        build/bounded-catalog-rebuild-regression.stdout.log
        build/bounded-catalog-rebuild-regression.stderr.log
      domain_artifact_if_no_files: error
      desktop_job_name: Real 24-world sidecar loss, visible rows, F3 backlog and steady catalog convergence
      desktop_timeout_minutes: 70
      desktop_script: res://tests/qa/bounded_catalog_rebuild_desktop_acceptance.gd
      desktop_output_path: build\bounded-catalog-rebuild-desktop.png
      desktop_timeout_milliseconds: 600000
      desktop_artifact_name: bounded-catalog-rebuild-evidence
      desktop_artifact_paths: |
        build/bounded-catalog-rebuild-desktop.png
        build/bounded-catalog-rebuild-desktop-health.png
        build/bounded-catalog-rebuild-desktop.json
        build/bounded-catalog-rebuild-desktop.stdout.log
        build/bounded-catalog-rebuild-desktop.stderr.log
      desktop_artifact_if_no_files: error
