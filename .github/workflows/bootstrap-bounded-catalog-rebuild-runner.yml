name: Run bounded catalog rebuild bootstrap

on:
  pull_request:

permissions:
  contents: write

jobs:
  run-bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bounded-catalog-rebuild
          fetch-depth: 0

      - name: Execute bootstrap and retain diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap
          import traceback

          source = Path('.github/workflows/bootstrap-bounded-catalog-rebuild.yml')
          diagnostic = Path('docs/BOUNDED_CATALOG_BOOTSTRAP_RESULT.txt')
          try:
              text = source.read_text(encoding='utf-8')
              script = text.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
              exec(compile(textwrap.dedent(script), 'bounded-catalog-bootstrap.py', 'exec'))
              diagnostic.write_text('SUCCESS\n', encoding='utf-8')
          except Exception:
              diagnostic.write_text('FAILURE\n' + traceback.format_exc(), encoding='utf-8')
          PY

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: capture bounded catalog bootstrap result" || true
          git push origin HEAD:agent/bounded-catalog-rebuild
