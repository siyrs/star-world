name: Run bounded catalog rebuild bootstrap

on:
  pull_request:

permissions:
  contents: write

jobs:
  run-bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bounded-catalog-rebuild
          fetch-depth: 0

      - name: Execute bootstrap patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/bootstrap-bounded-catalog-rebuild.yml')
          text = source.read_text(encoding='utf-8')
          script = text.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          exec(compile(textwrap.dedent(script), 'bounded-catalog-bootstrap.py', 'exec'))
          runner = Path('.github/workflows/bootstrap-bounded-catalog-rebuild-runner.yml')
          if runner.exists():
              runner.unlink()
          PY

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: apply bounded catalog rebuild"
          git push origin HEAD:agent/bounded-catalog-rebuild
