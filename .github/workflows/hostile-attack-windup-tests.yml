name: Hostile attack windup quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: hostile-attack-windup-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hostile-attack-windup-regression:
    name: Data contract, dodge state machine and prompt regression
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate hostile attack data and cross-domain timing
        shell: pwsh
        run: |
          .\tests\developer_b\validate_hostile_attacks.ps1

      - name: Run hostile attack windup regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/hostile_attack_windup_regression.gd'

      - name: Re-run combat cadence and ecology regressions
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/combat_cadence_regression.gd'
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/ecology_danger_regression.gd'
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/physics_interaction_regression.gd'

  real-hostile-attack-windup:
    name: Real warning, WASD dodge, committed hit and save acceptance
    needs: hostile-attack-windup-regression
    runs-on: windows-latest
    timeout-minutes: 26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production hostile windup journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/hostile_attack_windup_desktop_acceptance.gd' `
            -OutputPath 'build\hostile-attack-windup-desktop.png' `
            -TimeoutMilliseconds 120000

      - name: Upload hostile windup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hostile-attack-windup-desktop-${{ github.run_number }}
          path: |
            build/hostile-attack-windup-*.png
            build/hostile-attack-windup-*.log
          if-no-files-found: error
          retention-days: 14
