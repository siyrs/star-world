name: Publish Windows GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-windows-release-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Export, validate and publish resumable update assets
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Resolve release tag
        id: version
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.tag }}' } else { '${{ github.ref_name }}' }
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') { throw "Release tag must be vX.Y.Z: $tag" }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($Matches[1])" >> $env:GITHUB_OUTPUT

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Setup Godot with export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Validate tag and updater contracts
        shell: pwsh
        run: |
          $versionText = Get-Content -Raw -Encoding UTF8 .\src\update\app_version.gd
          if ($versionText -notmatch 'CURRENT_VERSION\s*:=\s*"([0-9]+\.[0-9]+\.[0-9]+)"') { throw 'Unable to read CURRENT_VERSION' }
          if ($Matches[1] -ne '${{ steps.version.outputs.version }}') { throw "Tag/version mismatch: tag=${{ steps.version.outputs.version }} app=$($Matches[1])" }
          # Windows Godot editor is a GUI-subsystem binary: pwsh does not wait for it and
          # $LASTEXITCODE stays stale. Use Start-Process -Wait and check the real ExitCode.
          $proc = Start-Process -FilePath godot -ArgumentList '--headless --path . --editor --quit' -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput godot-editor.out.log -RedirectStandardError godot-editor.err.log
          if ($proc.ExitCode -ne 0) {
            Get-Content godot-editor.out.log, godot-editor.err.log -ErrorAction SilentlyContinue
            exit $proc.ExitCode
          }
          .\tests\developer_b\validate_auto_update.ps1

      - name: Export Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\release | Out-Null
          $proc = Start-Process -FilePath godot -ArgumentList '--headless --path . --export-release "Windows Desktop" build\release\StarWorld.exe' -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput godot-export.out.log -RedirectStandardError godot-export.err.log
          Get-Content godot-export.out.log, godot-export.err.log -ErrorAction SilentlyContinue
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }
          if (-not (Test-Path build\release\StarWorld.exe)) { throw 'StarWorld.exe was not exported' }
          if (-not (Test-Path build\release\StarWorld.pck)) { throw 'StarWorld.pck was not exported' }

      - name: Build signed-by-checksum update package
        shell: pwsh
        run: |
          .\tools\build_update_release.ps1 `
            -BuildDirectory build\release `
            -Version '${{ steps.version.outputs.version }}' `
            -OutputDirectory build\release-assets

      - name: Install Mesa software OpenGL for smoke run
        shell: pwsh
        run: |
          # windows-latest runners have no OpenGL 3.3 driver; Mesa llvmpipe provides one.
          # Installed after packaging so the DLL never ships inside the release zip.
          $mesaUrl = 'https://github.com/mmozeiko/build-mesa/releases/download/26.1.5/mesa-llvmpipe-x64-26.1.5.7z'
          Invoke-WebRequest -Uri $mesaUrl -OutFile mesa-llvmpipe.7z
          C:\Windows\System32\tar.exe -xf mesa-llvmpipe.7z -C build\release
          if (-not (Test-Path build\release\opengl32.dll)) { throw 'Mesa opengl32.dll was not extracted' }

      - name: Smoke exported release without network update check
        shell: pwsh
        run: |
          # Game reads OS.get_cmdline_user_args(): everything must follow a literal `--`.
          $arguments = '-- --disable-update-check --release-smoke --smoke-soak-frames=60 --smoke-output=build/release-smoke.json'
          $process = Start-Process -FilePath build\release\StarWorld.exe -ArgumentList $arguments -PassThru -NoNewWindow `
            -RedirectStandardOutput build\smoke.out.log -RedirectStandardError build\smoke.err.log
          $failure = ''
          if (-not $process.WaitForExit(300000)) {
            Stop-Process -Id $process.Id -Force
            $failure = 'timed out after 300s'
          } elseif ($process.ExitCode -ne 0) {
            $failure = "exited with code $($process.ExitCode)"
          } elseif (-not (Test-Path build\release-smoke.json)) {
            $failure = 'report build/release-smoke.json is missing'
          }
          Get-Content build\smoke.out.log, build\smoke.err.log -ErrorAction SilentlyContinue
          if ($failure) { throw "Release smoke failed: $failure" }

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: starworld-windows-release-${{ steps.version.outputs.tag }}
          path: |
            build/release-assets/*
            build/release-smoke.json
          if-no-files-found: error
          retention-days: 14

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $assets = @(
            'build/release-assets/StarWorld-Windows-x86_64.zip',
            'build/release-assets/StarWorld-Windows-x86_64.zip.sha256'
          )
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag @assets --generate-notes --title "星的世界 $tag" --repo $env:GITHUB_REPOSITORY
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
