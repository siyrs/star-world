name: Tutorial and placement quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: tutorial-placement-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tutorial-placement-regression:
    name: Tutorial state and voxel target regression
    runs-on: windows-latest
    timeout-minutes: 16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Tutorial and placement regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/tutorial_placement_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  real-tutorial-journey:
    name: Real full tutorial and placement desktop acceptance
    needs: tutorial-placement-regression
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Play complete tutorial with real inputs
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/tutorial_placement_desktop_acceptance.gd' `
            -OutputPath 'build\tutorial-placement-desktop-acceptance.png'

      - name: Upload tutorial journey evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-placement-desktop-${{ github.run_number }}
          path: |
            build/tutorial-placement-desktop-acceptance.*
          if-no-files-found: error
          retention-days: 14
