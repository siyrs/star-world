name: Multi-hostile danger quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: multi-hostile-danger-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  multi-hostile-danger-regression:
    name: Event batching, cached samples, windup telemetry and HUD regression
    runs-on: windows-latest
    timeout-minutes: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate multi-hostile danger contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_ecology_danger.ps1
          .\tests\developer_b\validate_multi_hostile_danger.ps1
          .\tests\developer_b\validate_multi_hostile_arena_batch.ps1
          .\tests\developer_b\validate_hostile_attacks.ps1

      - name: Run batching and attack readability regressions
        shell: pwsh
        run: |
          $scripts = @(
            'res://tests/qa/multi_hostile_arena_batch_regression.gd',
            'res://tests/qa/multi_hostile_danger_batch_regression.gd',
            'res://tests/qa/ecology_danger_regression.gd',
            'res://tests/qa/hostile_attack_windup_regression.gd',
            'res://tests/qa/abyss_elite_regression.gd'
          )
          foreach ($script in $scripts) {
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script $script"
          }

  real-multi-hostile-danger-desktop:
    name: Real five-hostile spawn, windup, cancellation, mixed refresh and reload
    needs: multi-hostile-danger-regression
    runs-on: windows-latest
    timeout-minutes: 28
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production multi-hostile danger journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/multi_hostile_danger_batched_desktop_acceptance.gd' `
            -OutputPath 'build\multi-hostile-danger-desktop.png' `
            -TimeoutMilliseconds 180000

      - name: Upload multi-hostile danger evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multi-hostile-danger-${{ github.run_number }}
          path: |
            build/multi-hostile-danger-*.png
            build/multi-hostile-danger-*.log
          if-no-files-found: error
          retention-days: 14
