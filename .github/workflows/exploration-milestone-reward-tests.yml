name: Exploration milestone reward quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: exploration-milestone-reward-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exploration-reward-regression:
    name: Inventory transactions, reward registry and persistence regression
    runs-on: windows-latest
    timeout-minutes: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate reward and transaction data contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_exploration_rewards.ps1
          .\tests\developer_b\validate_exploration_journal.ps1

      - name: Run atomic inventory transaction regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/inventory_transaction_regression.gd'

      - name: Run exploration reward regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/exploration_milestone_reward_regression.gd'

      - name: Re-run exploration journal regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/exploration_journal_regression.gd'

      - name: Re-run gameplay service tests
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/developer_b/run_tests.gd'

  real-exploration-reward-desktop:
    name: Real claim, full inventory retry and world reload acceptance
    needs: exploration-reward-regression
    runs-on: windows-latest
    timeout-minutes: 28
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production milestone reward journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/exploration_milestone_reward_desktop_acceptance.gd' `
            -OutputPath 'build\exploration-milestone-reward-desktop.png' `
            -TimeoutMilliseconds 130000

      - name: Upload milestone reward evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exploration-milestone-reward-desktop-${{ github.run_number }}
          path: |
            build/exploration-milestone-reward-*.png
            build/exploration-milestone-reward-*.log
          if-no-files-found: error
          retention-days: 14
