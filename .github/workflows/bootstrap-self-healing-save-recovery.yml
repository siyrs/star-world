name: Bootstrap self-healing save recovery patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/self-healing-save-recovery
          fetch-depth: 0

      - name: Execute staged recovery patch
        id: apply
        shell: bash
        run: |
          set +e
          mkdir -p build
          python - <<'PY' > build/bootstrap-save-recovery.log 2>&1
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-self-healing-save-recovery-patch.yml').read_text(encoding='utf-8')
          script = workflow.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          script = script.replace("'''& \"$PSScriptRoot", "r'''& \"$PSScriptRoot")
          exec(compile(textwrap.dedent(script), 'staged-save-recovery-patch.py', 'exec'))
          PY
          status=$?
          cat build/bootstrap-save-recovery.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit applied production patch
        if: steps.apply.outputs.status == '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/save/save_service.gd src/diagnostics/runtime_health_report_service.gd src/diagnostics/runtime_health_report_policy.gd tests/run_all.ps1 docs/PRODUCT_ROADMAP.md
          git commit -m "feat: self-heal recovered save primaries"
          git push origin HEAD:agent/self-healing-save-recovery

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: save-recovery-bootstrap
          path: build/bootstrap-save-recovery.log
          if-no-files-found: error
          retention-days: 2

      - name: Fail when patch application failed
        if: steps.apply.outputs.status != '0'
        shell: bash
        run: exit 1
