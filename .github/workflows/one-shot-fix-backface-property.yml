name: One-shot fix backface property

on:
  push:
    branches:
      - agent/non-cube-block-geometry

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/non-cube-block-geometry
          fetch-depth: 0
      - name: Apply exact source fix and remove this workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/chunk/voxel_chunk.gd')
          text = path.read_text(encoding='utf-8')
          old = 'collision_shape.backface_collision_enabled = true'
          new = 'collision_shape.backface_collision = true'
          if old not in text:
              raise SystemExit('expected property assignment not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/one-shot-fix-backface-property.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/chunk/voxel_chunk.gd .github/workflows/one-shot-fix-backface-property.yml
          git commit -m "fix: use Godot concave backface property"
          git push origin HEAD:agent/non-cube-block-geometry
