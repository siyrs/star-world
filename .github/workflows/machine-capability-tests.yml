name: Machine capability quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: machine-capability-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  machine-capability-regression:
    name: Capability policy, atomic transfers and production composition
    runs-on: windows-latest
    timeout-minutes: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate machine capability contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_machine_capability.ps1

      - name: Run capability and adjacent machine regressions
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/machine_capability_regression.gd'
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/machine_base_regression.gd'
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/stonecutter_machine_regression.gd'

  real-machine-capability-desktop:
    name: Real atomic transfer, machine UI, save and reload
    needs: machine-capability-regression
    runs-on: windows-latest
    timeout-minutes: 28
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production machine capability journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/machine_capability_desktop_acceptance.gd' `
            -OutputPath 'build\machine-capability-desktop.png' `
            -TimeoutMilliseconds 130000

      - name: Upload machine capability evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: machine-capability-desktop-${{ github.run_number }}
          path: |
            build/machine-capability-*.png
            build/machine-capability-*.log
          if-no-files-found: error
          retention-days: 14
