name: Agriculture scale batching quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: agriculture-scale-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    # Reusable runner contract: tests/ci/Invoke-Godot.ps1,
    # tests/ci/run_godot_headless_test.ps1, and tests/ci/run_godot_desktop_test.ps1.
    uses: ./.github/workflows/reusable-godot-quality-gate.yml
    with:
      domain_job_name: Growth batching, hydration cache and exact maturity regression
      domain_timeout_minutes: 36
      static_validators: |
        tests/developer_b/validate_agriculture_scale.ps1
      primary_headless_script: res://tests/qa/agriculture_scale_batch_regression.gd
      primary_headless_output_base: build\agriculture-scale-regression
      primary_headless_timeout_milliseconds: 360000
      domain_scripts: |
        res://tests/qa/agriculture_runtime_lifecycle_regression.gd
        res://tests/qa/world_mutation_batch_regression.gd
      domain_artifact_name: agriculture-scale-domain
      domain_artifact_paths: |
        build/agriculture-scale-regression.stdout.log
        build/agriculture-scale-regression.stderr.log
      domain_artifact_if_no_files: error
      desktop_job_name: Real 2048-crop growth, visualization, save and reload
      desktop_timeout_minutes: 52
      desktop_script: res://tests/qa/agriculture_scale_desktop_acceptance.gd
      desktop_output_path: build\agriculture-scale-desktop.png
      desktop_timeout_milliseconds: 360000
      desktop_artifact_name: agriculture-scale-evidence
      desktop_artifact_paths: |
        build/agriculture-scale-desktop.png
        build/agriculture-scale-desktop.json
        build/agriculture-scale-desktop.stdout.log
        build/agriculture-scale-desktop.stderr.log
