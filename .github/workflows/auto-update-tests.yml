name: GitHub release auto-update quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: auto-update-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  updater-regression:
    name: Release policy, resume state, package integrity and helper acceptance
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate auto-update contracts
        shell: pwsh
        run: |
          try {
            .\tests\developer_b\validate_auto_update.ps1
          } catch {
            New-Item -ItemType Directory -Force -Path build | Out-Null
            @(
              "AUTO_UPDATE_STATIC_FAILURE=$($_.Exception.Message)",
              "STACK=$($_.ScriptStackTrace)"
            ) | Set-Content -LiteralPath build\auto-update-static-failure.txt -Encoding UTF8
            Write-Host "AUTO_UPDATE_STATIC_FAILURE=$($_.Exception.Message)"
            throw
          }

      - name: Upload static failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auto-update-static-failure-${{ github.run_number }}
          path: build/auto-update-static-failure.txt
          if-no-files-found: error
          retention-days: 14

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate strict project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Run release, resume and package regressions
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/auto_update_regression.gd -- --disable-update-check'

      - name: Exercise real interrupted HTTP Range resume
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\range-resume | Out-Null
          $work = (Resolve-Path build\range-resume).Path
          $fixture = Join-Path $work 'release-fixture.bin'
          $ready = Join-Path $work 'server-ready.json'
          $log = Join-Path $work 'server-log.jsonl'
          $python = (Get-Command python).Source
          $server = Start-Process -FilePath $python -ArgumentList @(
            'tests/ci/resumable_range_server.py',
            '--file', $fixture,
            '--ready-file', $ready,
            '--log-file', $log,
            '--port', '0'
          ) -PassThru -NoNewWindow
          try {
            $deadline = [DateTime]::UtcNow.AddSeconds(15)
            while (-not (Test-Path -LiteralPath $ready) -and [DateTime]::UtcNow -lt $deadline) {
              Start-Sleep -Milliseconds 100
            }
            if (-not (Test-Path -LiteralPath $ready)) { throw 'Local Range server did not become ready' }
            $download = Join-Path $work 'download'
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script res://tests/qa/resumable_download_acceptance.gd -- --disable-update-check --range-ready=$ready --range-work-dir=$download"
          } finally {
            if ($null -ne $server -and -not $server.HasExited) {
              Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Exercise real Windows directory swap, relaunch and rollback
        shell: pwsh
        run: |
          try {
            .\tests\qa\windows_update_helper_acceptance.ps1
          } catch {
            New-Item -ItemType Directory -Force -Path build | Out-Null
            @(
              "WINDOWS_UPDATE_HELPER_FAILURE=$($_.Exception.Message)",
              "STACK=$($_.ScriptStackTrace)"
            ) | Set-Content -LiteralPath build\windows-update-helper-failure.txt -Encoding UTF8
            Write-Host "WINDOWS_UPDATE_HELPER_FAILURE=$($_.Exception.Message)"
            throw
          }

      - name: Upload updater regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-update-regression-${{ github.run_number }}
          path: |
            build/windows-update-helper-failure.txt
            build/range-resume/server-ready.json
            build/range-resume/server-log.jsonl
            build/range-resume/download/download-state.json
            build/range-resume/download/*.part
          if-no-files-found: ignore
          retention-days: 14

  updater-desktop:
    name: Real first-start prompt, progress, interruption and retry UI
    needs: updater-regression
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production first-start update experience
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/auto_update_desktop_acceptance.gd' `
            -OutputPath 'build\auto-update-desktop.png' `
            -TimeoutMilliseconds 100000

      - name: Upload update prompt evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-update-desktop-${{ github.run_number }}
          path: |
            build/auto-update-*.png
            build/auto-update-*.log
          if-no-files-found: error
          retention-days: 14
