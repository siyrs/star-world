name: Machine Base quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: machine-base-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  machine-base-regression:
    name: Shared scheduler, strict state, furnace adapter and lifecycle regression
    runs-on: windows-latest
    timeout-minutes: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate Machine Base and lifecycle contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_machine_base.ps1
          .\tests\developer_b\validate_service_hub_lifecycle.ps1
          .\tests\developer_b\validate_husbandry_lifecycle.ps1
          .\tests\developer_b\validate_ranch_lifecycle.ps1

      - name: Run Machine Base and furnace regressions
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/machine_base_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          godot --headless --path . --script res://tests/qa/furnace_machine_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          godot --headless --path . --script res://tests/qa/service_hub_feature_lifecycle_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  real-machine-base-desktop:
    name: Real two-furnace scheduling, overlay, save and reload acceptance
    needs: machine-base-regression
    runs-on: windows-latest
    timeout-minutes: 28
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production Machine Base journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/machine_base_desktop_acceptance.gd' `
            -OutputPath 'build\machine-base-desktop.png' `
            -TimeoutMilliseconds 140000

      - name: Upload Machine Base evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: machine-base-desktop-${{ github.run_number }}
          path: |
            build/machine-base-*.png
            build/machine-base-*.log
          if-no-files-found: error
          retention-days: 14
