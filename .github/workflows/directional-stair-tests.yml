name: Directional stair quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: directional-stairs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  directional-stair-regression:
    name: Orientation policy, geometry, visuals and chunk regression
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate block visual inheritance
        shell: pwsh
        run: |
          .\tests\developer_b\validate_block_visuals.ps1

      - name: Directional stair regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/directional_stair_regression.gd'

  real-directional-stair-desktop:
    name: Real four-direction placement, collision and reload acceptance
    needs: directional-stair-regression
    runs-on: windows-latest
    timeout-minutes: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise four-direction placement and persistence
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/directional_stair_desktop_acceptance.gd' `
            -OutputPath 'build\directional-stair-desktop.png' `
            -TimeoutMilliseconds 110000

      - name: Upload directional stair evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: directional-stair-desktop-${{ github.run_number }}
          path: |
            build/directional-stair-*.png
            build/directional-stair-*.log
          if-no-files-found: error
          retention-days: 14
