name: One-shot update placement preview desktop contract

on:
  push:
    branches:
      - agent/non-cube-block-geometry

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/non-cube-block-geometry
          fetch-depth: 0
      - name: Update real placement contract and remove this workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/qa/placement_preview_desktop_acceptance.gd')
          text = path.read_text(encoding='utf-8')
          text = text.replace('_invalid_capture_path', '_extended_capture_path')
          text = text.replace('"%s-invalid.png" % _capture_path.get_basename()', '"%s-extended.png" % _capture_path.get_basename()')
          old = '''\t# Keep the crosshair on the same stone face. The cell that was green is now
\t# occupied by the newly placed planks, so the same contract must immediately
\t# turn red, name the blocker, and reject a repeated right click.
\tawait _aim_at(player, world.call("block_to_world", anchor))
\tfocus = player.call("get_interaction_focus")
\tpreview_state = focus.get("placement_preview", {})
\t_check(_array_to_vector3i(focus.get("hit_position", [])) == anchor, "occupied preview keeps the same visible target")
\t_check(_array_to_vector3i(preview_state.get("placement_position", [])) == expected_placement, "occupied preview keeps the same adjacent cell")
\t_check(bool(preview_state.get("placement_visible", false)), "occupied target still renders a placement ghost")
\t_check(not bool(preview_state.get("valid", true)), "ghost turns invalid after the cell becomes occupied")
\t_check(str(preview_state.get("reason", "")) == "occupied", "invalid ghost exposes the occupied reason")
\t_check(str(preview_state.get("occupied_block_id", "")) == "planks", "invalid ghost records the actual blocking block")
\tprompt = hub.player_experience.call("get_status").get("prompt", {})
\t_check("已被木板占用" in str(prompt.get("subtitle", "")), "invalid preview names the blocking block in text")
\tawait _capture(_extended_capture_path)
\tawait _right_click_center()
\t_check(str(world.call("get_block", expected_placement)) == "planks", "repeated right click cannot overwrite an occupied preview cell")
\t_check(hub.inventory.count_item("oak_planks") == 2, "rejected occupied placement consumes no item")
'''
          new = '''\t# With two-sided production collision, the newly placed plank correctly blocks
\t# the old stone face. Re-aiming at the same world point must therefore target
\t# the nearer plank and move the green ghost one cell toward the player.
\tvar extended_placement := expected_placement + Vector3i(0, 0, 1)
\tawait _aim_at(player, world.call("block_to_world", anchor))
\tfocus = player.call("get_interaction_focus")
\tpreview_state = focus.get("placement_preview", {})
\t_check(_array_to_vector3i(focus.get("hit_position", [])) == expected_placement, "newly placed block becomes the authoritative visible target")
\t_check(str(focus.get("block_id", "")) == "planks", "authoritative focus identifies the nearer plank")
\t_check(_array_to_vector3i(preview_state.get("placement_position", [])) == extended_placement, "green ghost advances to the next adjacent cell")
\t_check(bool(preview_state.get("placement_visible", false)), "new target still renders a placement ghost")
\t_check(bool(preview_state.get("valid", false)), "next empty cell remains valid for continuous building")
\t_check(str(preview_state.get("reason", "")) == "ok", "continuous placement exposes the stable ok reason")
\tprompt = hub.player_experience.call("get_status").get("prompt", {})
\t_check("放置" in str(prompt.get("secondary", "")), "continuous building keeps the right-click action")
\tawait _capture(_extended_capture_path)
\tawait _right_click_center()
\t_check(str(world.call("get_block", extended_placement)) == "planks", "second real right click extends the block line")
\t_check(hub.inventory.count_item("oak_planks") == 1, "second valid placement consumes exactly one item")
'''
          if old not in text:
              raise SystemExit('expected placement-preview block not found')
          text = text.replace(old, new, 1)
          text = text.replace('valid=%s | invalid=%s', 'valid=%s | extended=%s')
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/one-shot-update-placement-preview-test.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/qa/placement_preview_desktop_acceptance.gd .github/workflows/one-shot-update-placement-preview-test.yml
          git commit -m "test: validate continuous placement with real collision"
          git push origin HEAD:agent/non-cube-block-geometry
