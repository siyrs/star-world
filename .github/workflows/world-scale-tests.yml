name: World mutation scale quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: world-scale-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  world-mutation-regression:
    name: Rebuild batching, limits, diagnostics and adjacent domain regression
    runs-on: windows-latest
    timeout-minutes: 32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate strict project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate bounded world mutation contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_world_mutation_batch.ps1

      - name: Run batching and adjacent scale regressions
        shell: pwsh
        run: |
          $scripts = @(
            'res://tests/qa/world_mutation_batch_regression.gd',
            'res://tests/qa/connected_block_shapes_regression.gd',
            'res://tests/qa/agriculture_runtime_lifecycle_regression.gd',
            'res://tests/qa/adaptive_streaming_regression.gd',
            'res://tests/qa/runtime_soak_regression.gd'
          )
          foreach ($script in $scripts) {
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script $script -- --disable-update-check"
          }

  world-scale-desktop:
    name: Real 3000-mutation build, visualization, save, load and playable reload
    needs: world-mutation-regression
    runs-on: windows-latest
    timeout-minutes: 48
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production world-scale journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/world_scale_desktop_acceptance.gd' `
            -OutputPath 'build\world-scale-desktop.png' `
            -TimeoutMilliseconds 300000

      - name: Upload scale visualization and benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-scale-evidence-${{ github.run_number }}
          path: |
            build/world-scale-desktop.png
            build/world-scale-desktop.json
            build/world-scale-desktop.stdout.log
            build/world-scale-desktop.stderr.log
          if-no-files-found: error
          retention-days: 14
