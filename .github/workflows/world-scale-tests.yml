name: World mutation scale quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: world-scale-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    # Reusable runner contract: tests/ci/Invoke-Godot.ps1 and
    # tests/ci/run_godot_desktop_test.ps1 remain the awaited execution boundaries.
    uses: ./.github/workflows/reusable-godot-quality-gate.yml
    with:
      domain_job_name: Rebuild batching, limits, diagnostics and adjacent domain regression
      domain_timeout_minutes: 32
      static_validators: |
        tests/developer_b/validate_world_mutation_batch.ps1
      domain_scripts: |
        res://tests/qa/world_mutation_batch_regression.gd
        res://tests/qa/connected_block_shapes_regression.gd
        res://tests/qa/agriculture_runtime_lifecycle_regression.gd
        res://tests/qa/adaptive_streaming_regression.gd
      desktop_job_name: Real 3000-mutation build, visualization, save, load and playable reload
      desktop_timeout_minutes: 48
      desktop_script: res://tests/qa/world_scale_desktop_acceptance.gd
      desktop_output_path: build\world-scale-desktop.png
      desktop_timeout_milliseconds: 300000
      desktop_artifact_name: world-scale-evidence
      desktop_artifact_paths: |
        build/world-scale-desktop.png
        build/world-scale-desktop.json
        build/world-scale-desktop.stdout.log
        build/world-scale-desktop.stderr.log
