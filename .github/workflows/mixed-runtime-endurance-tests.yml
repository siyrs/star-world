name: Mixed runtime endurance quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: mixed-runtime-endurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    # Reusable runner contract: tests/ci/Invoke-Godot.ps1 and
    # tests/ci/run_godot_desktop_test.ps1 remain the awaited execution boundaries.
    uses: ./.github/workflows/reusable-godot-quality-gate.yml
    with:
      domain_job_name: Pickup stacking, no-loss pressure and adjacent domain regression
      domain_timeout_minutes: 38
      static_validators: |
        tests/developer_b/validate_pickup_stacks.ps1
      domain_scripts: |
        res://tests/qa/pickup_stack_regression.gd
        res://tests/qa/physics_interaction_regression.gd
        res://tests/qa/multi_hostile_danger_batch_regression.gd
      desktop_job_name: Real machine, crop, hostile drop, Chunk revisit, visualization, save and reload
      desktop_timeout_minutes: 65
      desktop_script: res://tests/qa/mixed_runtime_endurance_desktop_acceptance.gd
      desktop_output_path: build\mixed-runtime-endurance-desktop.png
      desktop_timeout_milliseconds: 480000
      desktop_artifact_name: mixed-runtime-endurance-evidence
      desktop_artifact_paths: |
        build/mixed-runtime-endurance-desktop.png
        build/mixed-runtime-endurance-desktop.json
        build/mixed-runtime-endurance-desktop.stdout.log
        build/mixed-runtime-endurance-desktop.stderr.log
