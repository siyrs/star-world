name: Mining crack feedback quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: mining-cracks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mining-crack-regression:
    name: Mining crack policy, textures and overlay regression
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Mining crack feedback regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/mining_crack_feedback_regression.gd'

  real-mining-crack-desktop:
    name: Real mining crack desktop acceptance
    needs: mining-crack-regression
    runs-on: windows-latest
    timeout-minutes: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise hold mining, completion and UI cancellation
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/mining_crack_feedback_desktop_acceptance.gd' `
            -OutputPath 'build\mining-crack-feedback-desktop.png' `
            -TimeoutMilliseconds 120000

      - name: Upload mining crack evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mining-crack-feedback-desktop-${{ github.run_number }}
          path: |
            build/mining-crack-feedback-*.png
            build/mining-crack-feedback-*.log
          if-no-files-found: error
          retention-days: 14
