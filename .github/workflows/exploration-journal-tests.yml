name: Exploration journal quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: exploration-journal-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exploration-journal-regression:
    name: Migration, milestones, overlay and journal regression
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate journal and extension overlay contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_exploration_journal.ps1

      - name: Re-run prospecting persistence regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/prospecting_regression.gd'

      - name: Run exploration journal regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/exploration_journal_regression.gd'

      - name: Re-run compact UI layout regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/ui_layout_regression.gd'

  real-exploration-journal-desktop:
    name: Real J-key journal, input isolation and reload acceptance
    needs: exploration-journal-regression
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production exploration journal journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/exploration_journal_desktop_acceptance.gd' `
            -OutputPath 'build\exploration-journal-desktop.png' `
            -TimeoutMilliseconds 120000

      - name: Upload exploration journal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exploration-journal-desktop-${{ github.run_number }}
          path: |
            build/exploration-journal-*.png
            build/exploration-journal-*.log
          if-no-files-found: error
          retention-days: 14
