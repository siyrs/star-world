name: Ranch products quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ranch-products-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ranch-domain:
    name: Ranch data and domain regression
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate ranch registries
        shell: pwsh
        run: .\tests\developer_b\validate_ranch.ps1

      - name: Ranch attraction and product regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/ranch_products_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  ranch-desktop:
    name: Real ranch products desktop acceptance
    needs: ranch-domain
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Ranch products desktop acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/ranch_products_desktop_acceptance.gd' `
            -OutputPath 'build\ranch-products-desktop-acceptance.png'

      - name: Upload ranch desktop evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranch-products-desktop-acceptance-${{ github.run_number }}
          path: |
            build/ranch-products-desktop-acceptance.*
          if-no-files-found: warn
          retention-days: 14
