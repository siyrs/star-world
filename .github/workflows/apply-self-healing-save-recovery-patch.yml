name: Apply self-healing save recovery patch

on:
  push:
    branches:
      - agent/self-healing-save-recovery

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/self-healing-save-recovery
          fetch-depth: 0

      - name: Apply recovery implementation patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one match, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "src/save/save_service.gd",
              '''var _last_catalog_avoided_world_bytes := 0
          var _last_catalog_elapsed_usec := 0
          ''',
              '''var _last_catalog_avoided_world_bytes := 0
          var _last_catalog_elapsed_usec := 0
          var _recovery_count := 0
          var _recovery_repair_attempt_count := 0
          var _recovery_repair_success_count := 0
          var _recovery_repair_failure_count := 0
          var _recovery_primary_rejection_count := 0
          var _last_recovery_world_id := ""
          var _last_recovery_source := ""
          var _last_recovery_repaired := false
          var _last_recovery_candidate_bytes := 0
          var _last_recovery_primary_bytes := 0
          var _last_recovery_elapsed_usec := 0
          var _last_recovery_rejected_sources: Array[String] = []
          ''',
          )

          replace_once(
              "src/save/save_service.gd",
              '''		else:
          			fallback_count += 1
          			var payload := _read_world_payload(world_id, false)
          			if payload.is_empty():
          				continue
          			var world_bytes := _file_size(_world_path(world_id))
          			var entry := WorldCatalogPolicyScript.build_entry(
          				world_id,
          				payload,
          				world_bytes
          			)
          			metadata = WorldCatalogPolicyScript.metadata_for_list(
          				entry,
          				"world_fallback"
          			)
          			if _write_catalog_entry(world_id, payload, world_bytes):
          				repair_count += 1
          			else:
          				_catalog_write_failure_count += 1
          ''',
              '''		else:
          			fallback_count += 1
          			var world_read := _read_world_result(world_id, false)
          			var payload: Dictionary = world_read.get("payload", {})
          			if payload.is_empty():
          				continue
          			var world_bytes := maxi(0, int(world_read.get("authoritative_bytes", 0)))
          			if world_bytes <= 0:
          				world_bytes = maxi(0, int(world_read.get("candidate_bytes", 0)))
          			var entry := WorldCatalogPolicyScript.build_entry(
          				world_id,
          				payload,
          				world_bytes
          			)
          			metadata = WorldCatalogPolicyScript.metadata_for_list(
          				entry,
          				"world_fallback"
          			)
          			# Never bless a corrupt primary with a fresh sidecar. If promotion
          			# failed, keep the world visible from its valid recovery candidate
          			# and retry authoritative repair on the next scan.
          			if bool(world_read.get("primary_ready", false)):
          				if _write_catalog_entry(world_id, payload, world_bytes):
          					repair_count += 1
          				else:
          					_catalog_write_failure_count += 1
          ''',
          )

          replace_once(
              "src/save/save_service.gd",
              '''func reset_catalog_diagnostics() -> void:
          	_catalog_list_count = 0
          	_catalog_hit_count = 0
          	_catalog_fallback_count = 0
          	_catalog_repair_count = 0
          	_catalog_write_failure_count = 0
          	_last_catalog_world_count = 0
          	_last_catalog_hit_count = 0
          	_last_catalog_fallback_count = 0
          	_last_catalog_repair_count = 0
          	_last_catalog_avoided_world_bytes = 0
          	_last_catalog_elapsed_usec = 0


          func delete_world(world_id: String) -> bool:
          ''',
              '''func reset_catalog_diagnostics() -> void:
          	_catalog_list_count = 0
          	_catalog_hit_count = 0
          	_catalog_fallback_count = 0
          	_catalog_repair_count = 0
          	_catalog_write_failure_count = 0
          	_last_catalog_world_count = 0
          	_last_catalog_hit_count = 0
          	_last_catalog_fallback_count = 0
          	_last_catalog_repair_count = 0
          	_last_catalog_avoided_world_bytes = 0
          	_last_catalog_elapsed_usec = 0


          func get_recovery_diagnostics() -> Dictionary:
          	return {
          		"recovery_count": _recovery_count,
          		"repair_attempt_count": _recovery_repair_attempt_count,
          		"repair_success_count": _recovery_repair_success_count,
          		"repair_failure_count": _recovery_repair_failure_count,
          		"primary_rejection_count": _recovery_primary_rejection_count,
          		"last_world_id": _last_recovery_world_id,
          		"last_source": _last_recovery_source,
          		"last_repaired": _last_recovery_repaired,
          		"last_candidate_bytes": _last_recovery_candidate_bytes,
          		"last_primary_bytes": _last_recovery_primary_bytes,
          		"last_elapsed_usec": _last_recovery_elapsed_usec,
          		"last_elapsed_milliseconds": float(_last_recovery_elapsed_usec) / 1000.0,
          		"last_rejected_sources": _last_recovery_rejected_sources.duplicate(),
          	}


          func reset_recovery_diagnostics() -> void:
          	_recovery_count = 0
          	_recovery_repair_attempt_count = 0
          	_recovery_repair_success_count = 0
          	_recovery_repair_failure_count = 0
          	_recovery_primary_rejection_count = 0
          	_last_recovery_world_id = ""
          	_last_recovery_source = ""
          	_last_recovery_repaired = false
          	_last_recovery_candidate_bytes = 0
          	_last_recovery_primary_bytes = 0
          	_last_recovery_elapsed_usec = 0
          	_last_recovery_rejected_sources.clear()


          func delete_world(world_id: String) -> bool:
          ''',
          )

          replace_once(
              "src/save/save_service.gd",
              '''func _read_world_payload(world_id: String, emit_recovery: bool) -> Dictionary:
          	if not _is_safe_id(world_id):
          		return {}
          	var result := _store.read_dictionary(_world_path(world_id))
          	if not bool(result.get("ok", false)):
          		return {}
          	var source := str(result.get("source", "primary"))
          	if emit_recovery and source != "primary":
          		save_recovered.emit(world_id, source)
          	var payload: Dictionary = result.get("data", {}).duplicate(true)
          	return _migrate(payload)
          ''',
              '''func _read_world_payload(world_id: String, emit_recovery: bool) -> Dictionary:
          	return _read_world_result(world_id, emit_recovery).get("payload", {})


          func _read_world_result(world_id: String, emit_recovery: bool) -> Dictionary:
          	if not _is_safe_id(world_id):
          		return {
          			"payload": {},
          			"source": "invalid_world_id",
          			"primary_ready": false,
          			"candidate_bytes": 0,
          			"authoritative_bytes": 0,
          		}
          	var world_path := _world_path(world_id)
          	var result := _store.read_dictionary_validated(
          		world_path,
          		Callable(self, "_is_valid_world_payload").bind(world_id),
          		true
          	)
          	if not bool(result.get("ok", false)):
          		return {
          			"payload": {},
          			"source": str(result.get("source", "missing_or_invalid")),
          			"primary_ready": false,
          			"candidate_bytes": 0,
          			"authoritative_bytes": 0,
          		}
          	var source := str(result.get("source", "primary"))
          	var primary_ready := source == "primary" or bool(result.get("repair_success", false))
          	if source != "primary":
          		_record_recovery_result(world_id, source, result, world_path)
          		if emit_recovery:
          			save_recovered.emit(world_id, source)
          	var raw_payload: Variant = result.get("data", {})
          	var payload: Dictionary = raw_payload.duplicate(true) if raw_payload is Dictionary else {}
          	return {
          		"payload": _migrate(payload),
          		"source": source,
          		"primary_ready": primary_ready,
          		"candidate_bytes": maxi(0, int(result.get("candidate_bytes", 0))),
          		"authoritative_bytes": _file_size(world_path) if primary_ready else 0,
          		"repair_success": bool(result.get("repair_success", false)),
          	}


          func _is_valid_world_payload(payload: Dictionary, expected_world_id: String) -> bool:
          	var raw_metadata: Variant = payload.get("metadata", null)
          	var raw_player: Variant = payload.get("player", null)
          	var raw_world: Variant = payload.get("world", null)
          	if (
          		raw_metadata is not Dictionary
          		or raw_player is not Dictionary
          		or raw_world is not Dictionary
          	):
          		return false
          	var metadata: Dictionary = raw_metadata
          	var stored_world_id := str(metadata.get("id", ""))
          	if not stored_world_id.is_empty() and stored_world_id != expected_world_id:
          		return false
          	var world: Dictionary = raw_world
          	return world.get("block_overrides", {}) is Dictionary


          func _record_recovery_result(
          	world_id: String,
          	source: String,
          	result: Dictionary,
          	world_path: String
          ) -> void:
          	_recovery_count += 1
          	var repair_attempted := bool(result.get("repair_attempted", false))
          	var repair_success := bool(result.get("repair_success", false))
          	if repair_attempted:
          		_recovery_repair_attempt_count += 1
          		if repair_success:
          			_recovery_repair_success_count += 1
          		else:
          			_recovery_repair_failure_count += 1
          	_last_recovery_rejected_sources.clear()
          	var raw_rejected: Variant = result.get("rejected_sources", [])
          	if raw_rejected is Array:
          		for raw_source: Variant in raw_rejected:
          			if _last_recovery_rejected_sources.size() >= 3:
          				break
          			_last_recovery_rejected_sources.append(str(raw_source))
          	if _last_recovery_rejected_sources.has("primary"):
          		_recovery_primary_rejection_count += 1
          	_last_recovery_world_id = world_id.left(128)
          	_last_recovery_source = source.left(32)
          	_last_recovery_repaired = repair_success
          	_last_recovery_candidate_bytes = maxi(0, int(result.get("candidate_bytes", 0)))
          	_last_recovery_primary_bytes = _file_size(world_path) if repair_success else 0
          	_last_recovery_elapsed_usec = maxi(0, int(result.get("repair_elapsed_usec", 0)))
          ''',
          )

          replace_once(
              "src/diagnostics/runtime_health_report_service.gd",
              '''	_last_save_timestamp_msec = 0


          func shutdown() -> void:
          ''',
              '''	_last_save_timestamp_msec = 0
          	if save_service != null and is_instance_valid(save_service):
          		if save_service.has_method("reset_recovery_diagnostics"):
          			save_service.call("reset_recovery_diagnostics")


          func shutdown() -> void:
          ''',
          )

          replace_once(
              "src/diagnostics/runtime_health_report_service.gd",
              '''func _save_snapshot() -> Dictionary:
          	return {
          		"attempt_count": _save_attempt_count,
          		"success_count": _save_success_count,
          		"failure_count": _save_failure_count,
          		"recovery_count": _save_recovery_count,
          		"last_success": _last_save_success,
          		"last_world_id": _last_save_world_id,
          		"last_bytes": _last_save_bytes,
          		"last_elapsed_usec": _last_save_elapsed_usec,
          		"last_elapsed_milliseconds": float(_last_save_elapsed_usec) / 1000.0,
          		"last_timestamp_msec": _last_save_timestamp_msec,
          	}
          ''',
              '''func _save_snapshot() -> Dictionary:
          	var recovery: Dictionary = {}
          	if (
          		save_service != null
          		and is_instance_valid(save_service)
          		and save_service.has_method("get_recovery_diagnostics")
          	):
          		var raw_recovery: Variant = save_service.call("get_recovery_diagnostics")
          		if raw_recovery is Dictionary:
          			recovery = raw_recovery
          	return {
          		"attempt_count": _save_attempt_count,
          		"success_count": _save_success_count,
          		"failure_count": _save_failure_count,
          		"recovery_count": maxi(
          			_save_recovery_count, maxi(0, int(recovery.get("recovery_count", 0)))
          		),
          		"repair_attempt_count": maxi(0, int(recovery.get("repair_attempt_count", 0))),
          		"repair_success_count": maxi(0, int(recovery.get("repair_success_count", 0))),
          		"repair_failure_count": maxi(0, int(recovery.get("repair_failure_count", 0))),
          		"primary_rejection_count": maxi(
          			0, int(recovery.get("primary_rejection_count", 0))
          		),
          		"last_recovery_source": str(recovery.get("last_source", "")).left(32),
          		"last_recovery_repaired": bool(recovery.get("last_repaired", false)),
          		"last_recovery_bytes": maxi(0, int(recovery.get("last_primary_bytes", 0))),
          		"last_recovery_elapsed_usec": maxi(
          			0, int(recovery.get("last_elapsed_usec", 0))
          		),
          		"last_recovery_elapsed_milliseconds": maxf(
          			0.0, float(recovery.get("last_elapsed_milliseconds", 0.0))
          		),
          		"last_success": _last_save_success,
          		"last_world_id": _last_save_world_id,
          		"last_bytes": _last_save_bytes,
          		"last_elapsed_usec": _last_save_elapsed_usec,
          		"last_elapsed_milliseconds": float(_last_save_elapsed_usec) / 1000.0,
          		"last_timestamp_msec": _last_save_timestamp_msec,
          	}
          ''',
          )

          replace_once(
              "src/diagnostics/runtime_health_report_policy.gd",
              '''static func _project_save(snapshot: Dictionary) -> Dictionary:
          	return {
          		"attempt_count": maxi(0, int(snapshot.get("attempt_count", 0))),
          		"success_count": maxi(0, int(snapshot.get("success_count", 0))),
          		"failure_count": maxi(0, int(snapshot.get("failure_count", 0))),
          		"recovery_count": maxi(0, int(snapshot.get("recovery_count", 0))),
          		"last_success": bool(snapshot.get("last_success", false)),
          		"last_world_id": str(snapshot.get("last_world_id", "")).left(128),
          		"last_bytes": maxi(0, int(snapshot.get("last_bytes", 0))),
          		"last_elapsed_usec": maxi(0, int(snapshot.get("last_elapsed_usec", 0))),
          		"last_elapsed_milliseconds": maxf(
          			0.0, float(snapshot.get("last_elapsed_milliseconds", 0.0))
          		),
          		"last_timestamp_msec": maxi(0, int(snapshot.get("last_timestamp_msec", 0))),
          	}
          ''',
              '''static func _project_save(snapshot: Dictionary) -> Dictionary:
          	return {
          		"attempt_count": maxi(0, int(snapshot.get("attempt_count", 0))),
          		"success_count": maxi(0, int(snapshot.get("success_count", 0))),
          		"failure_count": maxi(0, int(snapshot.get("failure_count", 0))),
          		"recovery_count": maxi(0, int(snapshot.get("recovery_count", 0))),
          		"repair_attempt_count": maxi(0, int(snapshot.get("repair_attempt_count", 0))),
          		"repair_success_count": maxi(0, int(snapshot.get("repair_success_count", 0))),
          		"repair_failure_count": maxi(0, int(snapshot.get("repair_failure_count", 0))),
          		"primary_rejection_count": maxi(
          			0, int(snapshot.get("primary_rejection_count", 0))
          		),
          		"last_recovery_source": str(snapshot.get("last_recovery_source", "")).left(32),
          		"last_recovery_repaired": bool(snapshot.get("last_recovery_repaired", false)),
          		"last_recovery_bytes": maxi(0, int(snapshot.get("last_recovery_bytes", 0))),
          		"last_recovery_elapsed_milliseconds": maxf(
          			0.0, float(snapshot.get("last_recovery_elapsed_milliseconds", 0.0))
          		),
          		"last_success": bool(snapshot.get("last_success", false)),
          		"last_world_id": str(snapshot.get("last_world_id", "")).left(128),
          		"last_bytes": maxi(0, int(snapshot.get("last_bytes", 0))),
          		"last_elapsed_usec": maxi(0, int(snapshot.get("last_elapsed_usec", 0))),
          		"last_elapsed_milliseconds": maxf(
          			0.0, float(snapshot.get("last_elapsed_milliseconds", 0.0))
          		),
          		"last_timestamp_msec": maxi(0, int(snapshot.get("last_timestamp_msec", 0))),
          	}
          ''',
          )

          replace_once(
              "src/diagnostics/runtime_health_report_policy.gd",
              '''static func _save_row(save: Dictionary) -> Dictionary:
          	var attempts := maxi(0, int(save.get("attempt_count", 0)))
          	if attempts <= 0:
          		return _informational_row("save", "保存", "本会话尚未保存")
          	var success := bool(save.get("last_success", false))
          	var detail := "%s · %.2f ms · %s" % [
          		_format_bytes(maxi(0, int(save.get("last_bytes", 0)))),
          		float(save.get("last_elapsed_milliseconds", 0.0)),
          		str(save.get("last_world_id", "")),
          	]
          	if not success:
          		return _informational_row(
          			"save",
          			"保存",
          			detail,
          			2,
          			"最近一次世界保存失败"
          		)
          	return _informational_row("save", "保存", detail)
          ''',
              '''static func _save_row(save: Dictionary) -> Dictionary:
          	var attempts := maxi(0, int(save.get("attempt_count", 0)))
          	var recovery_count := maxi(0, int(save.get("recovery_count", 0)))
          	var repair_successes := maxi(0, int(save.get("repair_success_count", 0)))
          	var repair_failures := maxi(0, int(save.get("repair_failure_count", 0)))
          	if attempts <= 0 and recovery_count <= 0:
          		return _informational_row("save", "保存", "本会话尚未保存或恢复")
          	var detail_parts: Array[String] = []
          	if attempts > 0:
          		detail_parts.append("%s · %.2f ms · %s" % [
          			_format_bytes(maxi(0, int(save.get("last_bytes", 0)))),
          			float(save.get("last_elapsed_milliseconds", 0.0)),
          			str(save.get("last_world_id", "")),
          		])
          	if recovery_count > 0:
          		detail_parts.append("恢复 %d · 主文件修复 %d/%d · %s · %.2f ms" % [
          			recovery_count,
          			repair_successes,
          			repair_failures,
          			str(save.get("last_recovery_source", "unknown")),
          			float(save.get("last_recovery_elapsed_milliseconds", 0.0)),
          		])
          	var detail := " · ".join(detail_parts)
          	if repair_failures > 0:
          		return _informational_row(
          			"save",
          			"保存",
          			detail,
          			2,
          			"存档已从恢复候选读取，但主文件重建失败 %d 次" % repair_failures
          		)
          	if attempts > 0 and not bool(save.get("last_success", false)):
          		return _informational_row(
          			"save",
          			"保存",
          			detail,
          			2,
          			"最近一次世界保存失败"
          		)
          	if recovery_count > 0:
          		var source := str(save.get("last_recovery_source", "恢复候选"))
          		var issue := (
          			"已从 %s 恢复并重建主存档" % source
          			if repair_successes > 0
          			else "本会话发生 %d 次存档恢复" % recovery_count
          		)
          		return _informational_row("save", "保存", detail, 1, issue)
          	return _informational_row("save", "保存", detail)
          ''',
          )

