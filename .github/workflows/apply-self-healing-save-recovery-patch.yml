          replace_once(
              "docs/PRODUCT_ROADMAP.md",
              '''- 原子 JSON、临时文件、备份恢复和严格存档迁移；
          - 轻量世界目录：`world.json` 保持唯一权威，`catalog.json` 缺失或损坏时按需自愈；
          ''',
              '''- 原子 JSON、临时文件、备份恢复和严格存档迁移；
          - `world.json` 语法损坏或核心结构失效时，会从有效 `.tmp` / `.bak` 恢复并原子重建主文件，同时保留有效备份；
