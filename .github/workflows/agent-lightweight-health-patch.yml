name: Apply lightweight runtime health source patch

on:
  push:
    branches:
      - agent/lightweight-runtime-health-sources

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/lightweight-runtime-health-sources
          fetch-depth: 0

      - name: Apply bounded health source changes
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one anchor, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          scheduler = "src/machine/machine_runtime_scheduler.gd"
          replace_once(
              scheduler,
              "var _last_batch: Dictionary = {}\n",
              "var _last_batch: Dictionary = {}\nvar _health_snapshot_count := 0\nvar _health_fallback_count := 0\n",
          )
          replace_once(
              scheduler,
              "\nfunc get_snapshot() -> Dictionary:\n",
              '''
func get_health_snapshot() -> Dictionary:
	_health_snapshot_count += 1
	var machine_count := 0
	var active_machine_count := 0
	var tracked_machine_count := 0
	var fallback_domain_count := 0
	for domain_id: StringName in _domain_order:
		var domain: Node = _domains.get(domain_id) as Node
		if domain == null or not is_instance_valid(domain):
			continue
		var raw_snapshot: Variant
		if domain.has_method("get_health_snapshot"):
			raw_snapshot = domain.call("get_health_snapshot")
		else:
			fallback_domain_count += 1
			_health_fallback_count += 1
			raw_snapshot = domain.call("get_runtime_snapshot")
		var snapshot: Dictionary = raw_snapshot if raw_snapshot is Dictionary else {}
		machine_count += maxi(0, int(snapshot.get("machine_count", 0)))
		active_machine_count += maxi(0, int(snapshot.get("active_machine_count", 0)))
		tracked_machine_count += maxi(0, int(snapshot.get("tracked_machine_count", 0)))
	return {
		"schema_version": 1,
		"active": _active,
		"shutdown": _shutdown,
		"domain_count": _domain_order.size(),
		"domain_limit": MAX_DOMAINS,
		"machine_count": machine_count,
		"active_machine_count": active_machine_count,
		"tracked_machine_count": tracked_machine_count,
		"tick_count": _tick_count,
		"total_domain_advances": _total_domain_advances,
		"total_changed_machines": _total_changed_machines,
		"max_domains_per_tick": _max_domains_per_tick,
		"health_snapshot_count": _health_snapshot_count,
		"fallback_domain_count": fallback_domain_count,
		"total_health_fallback_count": _health_fallback_count,
	}


func get_snapshot() -> Dictionary:
''',
          )

          for path in [
              "src/machine/scalable_furnace_service.gd",
              "src/machine/scalable_stonecutter_service.gd",
          ]:
              replace_once(
                  path,
                  "\nfunc get_runtime_snapshot() -> Dictionary:\n",
                  '''
func get_health_snapshot() -> Dictionary:
	return {
		"schema_version": 1,
		"machine_type": MACHINE_TYPE,
		"machine_count": _machines.size(),
		"active_machine_count": _activity_index.size(),
		"idle_machine_count": maxi(0, _machines.size() - _activity_index.size()),
		"externally_scheduled": _external_scheduler,
		"scheduler_call_count": _scheduler_call_count,
		"evaluation_batch_count": _evaluation_batch_count,
		"avoided_idle_evaluation_count": _avoided_idle_evaluation_count,
		"simulation_iteration_limit_hits": _simulation_iteration_limit_hits,
	}


func get_runtime_snapshot() -> Dictionary:
''',
              )

          automation = "src/machine/scalable_machine_automation_service.gd"
          replace_once(
              automation,
              "\nfunc get_runtime_snapshot() -> Dictionary:\n",
              '''
func get_health_snapshot() -> Dictionary:
	return {
		"schema_version": 1,
		"machine_count": 0,
		"tracked_machine_count": _candidate_order.size(),
		"active": world != null and is_instance_valid(world) and not _shutdown,
		"shutdown": _shutdown,
		"externally_scheduled": _externally_scheduled,
		"cycle_count": _cycle_count,
		"max_machines_per_cycle": ScaleAutomationPolicyScript.MAX_MACHINES_PER_CYCLE,
		"max_items_per_cycle": ScaleAutomationPolicyScript.MAX_ITEMS_PER_CYCLE,
		"candidate_order_dirty": _candidate_order_dirty,
		"candidate_sort_count": _candidate_sort_count,
	}


func get_runtime_snapshot() -> Dictionary:
''',
          )

          agriculture = "src/agriculture/scalable_agriculture_service.gd"
          replace_once(
              agriculture,
              "var _last_world_batch: Dictionary = {}\n",
              "var _last_world_batch: Dictionary = {}\nvar _health_mature_crop_count := 0\nvar _health_snapshot_count := 0\n",
          )
          replace_once(
              agriculture,
              '''func _init() -> void:
	soil_moisture = CachedSoilMoistureServiceScript.new()


func attach_world''',
              '''func _init() -> void:
	soil_moisture = CachedSoilMoistureServiceScript.new()


func _ready() -> void:
	super._ready()
	var stage_callback := Callable(self, "_on_health_crop_stage_changed")
	if not crop_stage_changed.is_connected(stage_callback):
		crop_stage_changed.connect(stage_callback)
	var harvest_callback := Callable(self, "_on_health_crop_harvested")
	if not crop_harvested.is_connected(harvest_callback):
		crop_harvested.connect(harvest_callback)


func attach_world''',
          )
          replace_once(
              agriculture,
              '\t_finish_world_batch(batch_started, "agriculture_attach")\n',
              '\t_finish_world_batch(batch_started, "agriculture_attach")\n\t_recount_health_mature_crops()\n',
          )
          replace_once(
              agriculture,
              '''func advance_time(seconds: float) -> void:
	if world == null or seconds <= 0.0:
		return
	var batch_started := _begin_world_batch("agriculture_advance")
	super.advance_time(seconds)
	_finish_world_batch(batch_started, "agriculture_advance")
''',
              '''func deserialize(data: Dictionary) -> bool:
	var success := super.deserialize(data)
	_recount_health_mature_crops()
	return success


func advance_time(seconds: float) -> void:
	if world == null or seconds <= 0.0:
		return
	var crop_count_before := _crops.size()
	var batch_started := _begin_world_batch("agriculture_advance")
	super.advance_time(seconds)
	_finish_world_batch(batch_started, "agriculture_advance")
	if _crops.size() != crop_count_before:
		_recount_health_mature_crops()
''',
          )
          replace_once(
              agriculture,
              '''func clear() -> void:
	super.clear()
	_reset_world_batch_runtime()
''',
              '''func clear() -> void:
	super.clear()
	_reset_world_batch_runtime()
	_health_mature_crop_count = 0
	_health_snapshot_count = 0
''',
          )
          replace_once(
              agriculture,
              "\nfunc get_runtime_snapshot() -> Dictionary:\n",
              '''
func on_block_removed(p_world: Node, block_position: Vector3i, block_id: String) -> void:
	var crop_count_before := _crops.size()
	super.on_block_removed(p_world, block_position, block_id)
	if _crops.size() != crop_count_before:
		_recount_health_mature_crops()


func get_health_snapshot() -> Dictionary:
	_health_snapshot_count += 1
	return {
		"schema_version": 1,
		"active": _runtime_active,
		"shutdown": _shutdown,
		"world_attached": world != null and is_instance_valid(world),
		"crop_count": _crops.size(),
		"mature_crop_count": _health_mature_crop_count,
		"soil_count": soil_moisture.get_soil_count(),
		"atomic_harvest_rejection_count": _atomic_harvest_rejection_count,
		"world_mutation_batch": {
			"rejection_count": _world_batch_rejection_count,
			"unsupported_count": _world_batch_unsupported_count,
		},
		"health_snapshot_count": _health_snapshot_count,
	}


func get_runtime_snapshot() -> Dictionary:
''',
          )
          replace_once(
              agriculture,
              "\nfunc _begin_world_batch(reason: String) -> bool:\n",
              '''
func _on_health_crop_stage_changed(
	_position: Vector3i, crop_id: String, stage: int
) -> void:
	var definition: Dictionary = crop_registry.get_crop(crop_id)
	var stages: Array = definition.get("stage_blocks", [])
	if not stages.is_empty() and stage >= stages.size() - 1:
		_health_mature_crop_count = mini(_crops.size(), _health_mature_crop_count + 1)


func _on_health_crop_harvested(
	_position: Vector3i, _crop_id: String, _outputs: Array
) -> void:
	_health_mature_crop_count = maxi(0, _health_mature_crop_count - 1)


func _recount_health_mature_crops() -> void:
	var mature_count := 0
	for raw_state: Variant in _crops.values():
		if raw_state is Dictionary and _is_health_mature_state(raw_state):
			mature_count += 1
	_health_mature_crop_count = mini(_crops.size(), mature_count)


func _is_health_mature_state(state: Dictionary) -> bool:
	var crop_id := str(state.get("crop_id", ""))
	var definition: Dictionary = crop_registry.get_crop(crop_id)
	var stages: Array = definition.get("stage_blocks", [])
	return (
		not stages.is_empty()
		and int(state.get("stage", 0)) >= stages.size() - 1
	)


func _begin_world_batch(reason: String) -> bool:
''',
          )

          report = "src/diagnostics/runtime_health_report_service.gd"
          replace_once(
              report,
              "var _last_source_count := 0\nvar _shutdown := false\n",
              "var _last_source_count := 0\nvar _last_source_methods: Dictionary = {}\nvar _fallback_source_count := 0\nvar _unavailable_source_count := 0\nvar _shutdown := false\n",
          )
          old_snapshot = '''func get_snapshot() -> Dictionary:
	if _shutdown:
		return PolicyScript.build({})
	var sources := {
		"streaming": _snapshot(world, "get_streaming_stats"),
		"machines": _snapshot(_hub_node("machine_runtime"), "get_snapshot"),
		"agriculture": _snapshot(
			_hub_node("agriculture_service"), "get_runtime_snapshot"
		),
		"husbandry": _snapshot(_hub_node("husbandry_service"), "get_snapshot"),
		"animal_attraction": _snapshot(
			_hub_node("animal_attraction_service"), "get_snapshot"
		),
		"animal_products": _snapshot(
			_hub_node("animal_product_service"), "get_snapshot"
		),
		"ecology": _snapshot(_hub_node("creature_spawner"), "get_ecology_snapshot"),
		"pickups": _snapshot(_hub_node("pickup_stack_coordinator"), "get_snapshot"),
		"structural_integrity": _snapshot(
			_hub_node("structural_integrity_service"), "get_snapshot"
		),
		"catalog": _snapshot(save_service, "get_catalog_diagnostics"),
		"save": _save_snapshot(),
	}
	_last_source_count = sources.size()
	var result: Dictionary = PolicyScript.build(sources)
	result["world_attached"] = world != null and is_instance_valid(world)
	result["current_world_id"] = _current_world_id
	result["source_count"] = _last_source_count
	result["source_limit"] = sources.size()
	return result
'''
          new_snapshot = '''func get_snapshot() -> Dictionary:
	if _shutdown:
		return PolicyScript.build({})
	_last_source_methods.clear()
	_fallback_source_count = 0
	_unavailable_source_count = 0
	var sources := {
		"streaming": _snapshot_preferred(
			"streaming", world, ["get_streaming_stats"]
		),
		"machines": _snapshot_preferred(
			"machines", _hub_node("machine_runtime"), ["get_health_snapshot", "get_snapshot"]
		),
		"agriculture": _snapshot_preferred(
			"agriculture",
			_hub_node("agriculture_service"),
			["get_health_snapshot", "get_runtime_snapshot"]
		),
		"husbandry": _snapshot_preferred(
			"husbandry", _hub_node("husbandry_service"), ["get_snapshot"]
		),
		"animal_attraction": _snapshot_preferred(
			"animal_attraction", _hub_node("animal_attraction_service"), ["get_snapshot"]
		),
		"animal_products": _snapshot_preferred(
			"animal_products", _hub_node("animal_product_service"), ["get_snapshot"]
		),
		"ecology": _snapshot_preferred(
			"ecology", _hub_node("creature_spawner"), ["get_ecology_snapshot"]
		),
		"pickups": _snapshot_preferred(
			"pickups", _hub_node("pickup_stack_coordinator"), ["get_snapshot"]
		),
		"structural_integrity": _snapshot_preferred(
			"structural_integrity",
			_hub_node("structural_integrity_service"),
			["get_snapshot"]
		),
		"catalog": _snapshot_preferred(
			"catalog", save_service, ["get_catalog_diagnostics"]
		),
		"save": _save_snapshot(),
	}
	_last_source_methods["save"] = "session_snapshot"
	_last_source_count = sources.size()
	var result: Dictionary = PolicyScript.build(sources)
	result["world_attached"] = world != null and is_instance_valid(world)
	result["current_world_id"] = _current_world_id
	result["source_count"] = _last_source_count
	result["source_limit"] = sources.size()
	result["source_methods"] = _last_source_methods.duplicate(true)
	result["fallback_source_count"] = _fallback_source_count
	result["unavailable_source_count"] = _unavailable_source_count
	result["preferred_source_count"] = maxi(
		0, _last_source_count - _fallback_source_count - _unavailable_source_count
	)
	return result
'''
          replace_once(report, old_snapshot, new_snapshot)
          replace_once(
              report,
              '''func get_save_snapshot() -> Dictionary:
	return _save_snapshot()
''',
              '''func get_save_snapshot() -> Dictionary:
	return _save_snapshot()


func get_source_contract_snapshot() -> Dictionary:
	return {
		"source_count": _last_source_count,
		"source_methods": _last_source_methods.duplicate(true),
		"fallback_source_count": _fallback_source_count,
		"unavailable_source_count": _unavailable_source_count,
	}
''',
          )
          replace_once(
              report,
              '''	_current_world_id = ""


func _save_snapshot''',
              '''	_current_world_id = ""
	_last_source_methods.clear()
	_fallback_source_count = 0
	_unavailable_source_count = 0


func _save_snapshot''',
          )
          replace_once(
              report,
              '''func _snapshot(target: Node, method_name: String) -> Dictionary:
	if (
		target == null
		or not is_instance_valid(target)
		or not target.has_method(method_name)
	):
		return {}
	var raw_snapshot: Variant = target.call(method_name)
	return raw_snapshot if raw_snapshot is Dictionary else {}
''',
              '''func _snapshot_preferred(
	source_id: String, target: Node, methods: Array
) -> Dictionary:
	if target == null or not is_instance_valid(target):
		_last_source_methods[source_id] = "unavailable"
		_unavailable_source_count += 1
		return {}
	for method_index in methods.size():
		var method_name := str(methods[method_index])
		if not target.has_method(method_name):
			continue
		_last_source_methods[source_id] = method_name
		if method_index > 0:
			_fallback_source_count += 1
		var raw_snapshot: Variant = target.call(method_name)
		return raw_snapshot if raw_snapshot is Dictionary else {}
	_last_source_methods[source_id] = "unavailable"
	_unavailable_source_count += 1
	return {}
''',
          )

          print("Applied lightweight runtime health source patch")
          '@ | Set-Content -LiteralPath build_agent_patch.py -Encoding utf8
          python build_agent_patch.py
          Remove-Item build_agent_patch.py

      - name: Commit patched sources and remove one-shot workflow
        shell: pwsh
        run: |
          git config user.name "star-world-ci"
          git config user.email "star-world-ci@users.noreply.github.com"
          git rm .github/workflows/agent-lightweight-health-patch.yml
          git add src/machine src/agriculture src/diagnostics
          git commit -m "perf: add lightweight runtime health source ports"
          git push origin HEAD:agent/lightweight-runtime-health-sources
