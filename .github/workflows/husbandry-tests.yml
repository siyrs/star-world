name: Husbandry quality gates

on:
  pull_request:
    paths:
      - 'data/husbandry.json'
      - 'data/creatures.json'
      - 'src/core/service_hub_feature_coordinator.gd'
      - 'src/husbandry/**'
      - 'src/player/husbandry_player.gd'
      - 'src/entity/creature_population_policy.gd'
      - 'src/experience/**'
      - 'src/ui/husbandry_progression_service_hub.gd'
      - 'src/ui/ranch_progression_service_hub.gd'
      - 'src/ui/exploration_progression_service_hub.gd'
      - 'src/save/save_service.gd'
      - 'scenes/game/player.tscn'
      - 'scenes/ui/service_hub.tscn'
      - 'tests/developer_b/validate_husbandry*.ps1'
      - 'tests/developer_b/validate_service_hub_lifecycle.ps1'
      - 'tests/qa/husbandry_*.gd'
      - 'tests/qa/ranch_runtime_lifecycle_regression.gd'
      - 'tests/qa/service_hub_feature_lifecycle_regression.gd'
      - '.github/workflows/husbandry-tests.yml'
  push:
    branches:
      - master
    paths:
      - 'data/husbandry.json'
      - 'data/creatures.json'
      - 'src/core/service_hub_feature_coordinator.gd'
      - 'src/husbandry/**'
      - 'src/player/husbandry_player.gd'
      - 'src/entity/creature_population_policy.gd'
      - 'src/experience/**'
      - 'src/ui/husbandry_progression_service_hub.gd'
      - 'src/ui/ranch_progression_service_hub.gd'
      - 'src/ui/exploration_progression_service_hub.gd'
      - 'src/save/save_service.gd'
      - 'scenes/game/player.tscn'
      - 'scenes/ui/service_hub.tscn'
      - 'tests/developer_b/validate_husbandry*.ps1'
      - 'tests/developer_b/validate_service_hub_lifecycle.ps1'
      - 'tests/qa/husbandry_*.gd'
      - 'tests/qa/ranch_runtime_lifecycle_regression.gd'
      - 'tests/qa/service_hub_feature_lifecycle_regression.gd'
      - '.github/workflows/husbandry-tests.yml'

permissions:
  contents: read

concurrency:
  group: husbandry-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  husbandry-domain:
    name: Husbandry data, lifecycle, batching and dependency regression
    runs-on: windows-latest
    timeout-minutes: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate husbandry registry and lifecycle
        shell: pwsh
        run: |
          .\tests\developer_b\validate_husbandry.ps1
          .\tests\developer_b\validate_husbandry_lifecycle.ps1
          .\tests\developer_b\validate_service_hub_lifecycle.ps1

      - name: Run husbandry domain and lifecycle regressions
        shell: pwsh
        run: |
          $scripts = @(
            'res://tests/qa/husbandry_regression.gd',
            'res://tests/qa/husbandry_runtime_lifecycle_regression.gd',
            'res://tests/qa/ranch_runtime_lifecycle_regression.gd',
            'res://tests/qa/service_hub_feature_lifecycle_regression.gd'
          )
          foreach ($script in $scripts) {
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script $script"
          }

  husbandry-desktop:
    name: Real animal breeding desktop acceptance
    needs: husbandry-domain
    runs-on: windows-latest
    timeout-minutes: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Husbandry desktop acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/husbandry_desktop_acceptance.gd' `
            -OutputPath 'build\husbandry-desktop-acceptance.png' `
            -TimeoutMilliseconds 125000

      - name: Upload husbandry desktop evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: husbandry-desktop-acceptance-${{ github.run_number }}
          path: |
            build/husbandry-desktop-acceptance.*
          if-no-files-found: error
          retention-days: 14

  husbandry-lifecycle-desktop:
    name: Real batched births, growth, cleanup and reload acceptance
    needs: husbandry-domain
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production husbandry lifecycle
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/husbandry_runtime_lifecycle_desktop_acceptance.gd' `
            -OutputPath 'build\husbandry-runtime-lifecycle-desktop.png' `
            -TimeoutMilliseconds 150000

      - name: Upload husbandry lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: husbandry-runtime-lifecycle-${{ github.run_number }}
          path: |
            build/husbandry-runtime-lifecycle-*.png
            build/husbandry-runtime-lifecycle-*.log
          if-no-files-found: error
          retention-days: 14
