name: Husbandry quality gates

on:
  pull_request:
    paths:
      - 'data/husbandry.json'
      - 'data/creatures.json'
      - 'src/husbandry/**'
      - 'src/player/husbandry_player.gd'
      - 'src/entity/creature_population_policy.gd'
      - 'src/experience/**'
      - 'src/ui/husbandry_progression_service_hub.gd'
      - 'src/save/save_service.gd'
      - 'scenes/game/player.tscn'
      - 'scenes/ui/service_hub.tscn'
      - 'tests/developer_b/validate_husbandry.ps1'
      - 'tests/qa/husbandry_*.gd'
      - '.github/workflows/husbandry-tests.yml'
  push:
    branches:
      - master
    paths:
      - 'data/husbandry.json'
      - 'data/creatures.json'
      - 'src/husbandry/**'
      - 'src/player/husbandry_player.gd'
      - 'src/entity/creature_population_policy.gd'
      - 'src/experience/**'
      - 'src/ui/husbandry_progression_service_hub.gd'
      - 'src/save/save_service.gd'
      - 'scenes/game/player.tscn'
      - 'scenes/ui/service_hub.tscn'
      - 'tests/developer_b/validate_husbandry.ps1'
      - 'tests/qa/husbandry_*.gd'
      - '.github/workflows/husbandry-tests.yml'

permissions:
  contents: read

concurrency:
  group: husbandry-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  husbandry-domain:
    name: Husbandry data and domain regression
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate husbandry registry
        shell: pwsh
        run: .\tests\developer_b\validate_husbandry.ps1

      - name: Husbandry lifecycle regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/husbandry_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  husbandry-desktop:
    name: Real animal breeding desktop acceptance
    needs: husbandry-domain
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Husbandry desktop acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/husbandry_desktop_acceptance.gd' `
            -OutputPath 'build\husbandry-desktop-acceptance.png'

      - name: Upload husbandry desktop evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: husbandry-desktop-acceptance-${{ github.run_number }}
          path: |
            build/husbandry-desktop-acceptance.*
          if-no-files-found: warn
          retention-days: 14
