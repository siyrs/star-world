name: Double-height oak door quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: double-door-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  double-door-regression:
    name: State mapping, atomic placement, toggle and paired harvest
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate strict project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate double-door contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_double_doors.ps1

      - name: Run door and adjacent geometry regressions
        shell: pwsh
        run: |
          $scripts = @(
            'res://tests/qa/double_door_regression.gd',
            'res://tests/qa/block_interaction_regression.gd',
            'res://tests/qa/non_cube_block_geometry_regression.gd',
            'res://tests/qa/placement_preview_regression.gd'
          )
          foreach ($script in $scripts) {
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script $script -- --disable-update-check"
          }

  double-door-desktop:
    name: Real placement, open/close, upper harvest, save and reload
    needs: double-door-regression
    runs-on: windows-latest
    timeout-minutes: 32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production double-door journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/double_door_desktop_acceptance.gd' `
            -OutputPath 'build\double-door-desktop.png' `
            -TimeoutMilliseconds 150000

      - name: Upload double-door evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: double-door-desktop-${{ github.run_number }}
          path: |
            build/double-door-*.png
            build/double-door-*.log
          if-no-files-found: error
          retention-days: 14
