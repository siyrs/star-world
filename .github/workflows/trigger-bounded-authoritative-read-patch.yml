name: Trigger bounded authoritative read patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/bounded-authoritative-read'
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bounded-authoritative-read
          fetch-depth: 1
          fetch-tags: false
          show-progress: false
      - name: Reuse and apply the committed patch script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow_path = Path('.github/workflows/apply-bounded-authoritative-read-patch.yml')
          text = workflow_path.read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          tail = "\n          PY\n"
          if marker not in text or tail not in text:
              raise RuntimeError('Unable to extract the committed patch script')
          script = text.split(marker, 1)[1].split(tail, 1)[0]
          try:
              exec(compile(textwrap.dedent(script), str(workflow_path), 'exec'))
          except Exception as error:
              raise RuntimeError(f'PATCH_ERROR: {error}') from error
          Path('.github/workflows/trigger-bounded-authoritative-read-patch.yml').unlink()
          PY
      - name: Commit production patch
        shell: bash
        run: |
          git config user.name "star-world-agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "perf: bound authoritative world reads per scan"
          git push origin HEAD:agent/bounded-authoritative-read
