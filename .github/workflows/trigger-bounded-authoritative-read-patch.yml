name: Trigger bounded authoritative read patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/bounded-authoritative-read'
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bounded-authoritative-read
          fetch-depth: 1
          fetch-tags: false
          show-progress: false
      - name: Apply committed production patch
        shell: bash
        run: python .github/scripts/trigger_bounded_authoritative_read_patch.py
      - name: Upload patch diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bounded-authoritative-read-patch-error
          path: build/bounded-authoritative-read-patch-error.txt
          if-no-files-found: error
          retention-days: 1
      - name: Commit production patch
        shell: bash
        run: |
          git config user.name "star-world-agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "perf: bound authoritative world reads per scan"
          git push origin HEAD:agent/bounded-authoritative-read
