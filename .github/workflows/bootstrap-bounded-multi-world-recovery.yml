name: Bootstrap bounded multi-world recovery

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bounded-multi-world-recovery
          fetch-depth: 0

      - name: Apply bounded recovery patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def load(path): return Path(path).read_text(encoding='utf-8')
          def save(path, text): Path(path).write_text(text, encoding='utf-8')
          def once(text, old, new, label):
              if old not in text:
                  raise RuntimeError(f'missing anchor: {label}')
              return text.replace(old, new, 1)
          def method(text, name, body):
              pattern = rf'(?ms)^func {re.escape(name)}\s*\(.*?(?=^func |\Z)'
              match = re.search(pattern, text)
              if not match:
                  raise RuntimeError(f'missing method: {name}')
              return text[:match.start()] + body.rstrip() + '\n\n\n' + text[match.end():]

          path = 'src/save/save_service.gd'
          text = load(path)
          text = once(text, 'const CATALOG_FILE_NAME := "catalog.json"\n', 'const CATALOG_FILE_NAME := "catalog.json"\nconst MAX_PRIMARY_REPAIRS_PER_LIST := 8\n', 'catalog constant')
          text = once(text, 'var _last_catalog_elapsed_usec := 0\n', 'var _last_catalog_elapsed_usec := 0\nvar _catalog_deferred_recovery_count := 0\nvar _last_catalog_deferred_recovery_count := 0\nvar _last_catalog_repair_budget_used := 0\n', 'catalog diagnostics vars')
          text = method(text, 'list_worlds', '''func list_worlds() -> Array:
\t_ensure_directory(WORLDS_DIR)
\tvar started_at := Time.get_ticks_usec()
\tvar result: Array = []
\tvar hit_count := 0
\tvar fallback_count := 0
\tvar repair_count := 0
\tvar deferred_recovery_count := 0
\tvar repair_budget_used := 0
\tvar avoided_world_bytes := 0
\tvar directory := DirAccess.open(WORLDS_DIR)
\tif directory == null:
\t\t_record_catalog_list(0, 0, 0, 0, 0, 0, 0, Time.get_ticks_usec() - started_at)
\t\treturn result
\tvar world_ids: PackedStringArray = directory.get_directories()
\tworld_ids.sort()
\tfor raw_world_id: String in world_ids:
\t\tvar world_id := str(raw_world_id)
\t\tvar metadata: Dictionary = {}
\t\tvar catalog_read: Dictionary = _read_catalog_entry(world_id)
\t\tif not catalog_read.is_empty():
\t\t\tvar entry: Dictionary = catalog_read.get("entry", {})
\t\t\tmetadata = WorldCatalogPolicyScript.metadata_for_list(entry, "catalog")
\t\t\thit_count += 1
\t\t\tavoided_world_bytes += int(catalog_read.get("world_bytes", 0))
\t\telse:
\t\t\tfallback_count += 1
\t\t\tvar allow_primary_repair := repair_budget_used < MAX_PRIMARY_REPAIRS_PER_LIST
\t\t\tvar world_read := _read_world_result(world_id, false, allow_primary_repair)
\t\t\tif bool(world_read.get("repair_attempted", false)):
\t\t\t\trepair_budget_used += 1
\t\t\tvar source := str(world_read.get("source", "primary"))
\t\t\tvar primary_ready := bool(world_read.get("primary_ready", false))
\t\t\tif source != "primary" and not primary_ready:
\t\t\t\tdeferred_recovery_count += 1
\t\t\tvar payload: Dictionary = world_read.get("payload", {})
\t\t\tif payload.is_empty():
\t\t\t\tcontinue
\t\t\tvar world_bytes := maxi(0, int(world_read.get("authoritative_bytes", 0)))
\t\t\tif world_bytes <= 0:
\t\t\t\tworld_bytes = maxi(0, int(world_read.get("candidate_bytes", 0)))
\t\t\tvar entry := WorldCatalogPolicyScript.build_entry(world_id, payload, world_bytes)
\t\t\tmetadata = WorldCatalogPolicyScript.metadata_for_list(entry, "world_fallback")
\t\t\tmetadata["recovery_deferred"] = source != "primary" and not primary_ready
\t\t\tif primary_ready:
\t\t\t\tif _write_catalog_entry(world_id, payload, world_bytes):
\t\t\t\t\trepair_count += 1
\t\t\t\telse:
\t\t\t\t\t_catalog_write_failure_count += 1
\t\tif not metadata.is_empty():
\t\t\tresult.append(metadata)
\tresult.sort_custom(func(a: Dictionary, b: Dictionary) -> bool: return str(a.get("updated_at", "")) > str(b.get("updated_at", "")))
\t_record_catalog_list(result.size(), hit_count, fallback_count, repair_count, deferred_recovery_count, repair_budget_used, avoided_world_bytes, Time.get_ticks_usec() - started_at)
\treturn result''')
          text = once(text, '\t\t"last_hit_ratio": hit_ratio,\n', '\t\t"last_hit_ratio": hit_ratio,\n\t\t"primary_repair_budget": MAX_PRIMARY_REPAIRS_PER_LIST,\n\t\t"deferred_recovery_count": _catalog_deferred_recovery_count,\n\t\t"last_deferred_recovery_count": _last_catalog_deferred_recovery_count,\n\t\t"last_repair_budget_used": _last_catalog_repair_budget_used,\n', 'catalog diagnostics output')
          text = once(text, '\t_last_catalog_elapsed_usec = 0\n\n\nfunc get_recovery_diagnostics', '\t_last_catalog_elapsed_usec = 0\n\t_catalog_deferred_recovery_count = 0\n\t_last_catalog_deferred_recovery_count = 0\n\t_last_catalog_repair_budget_used = 0\n\n\nfunc get_recovery_diagnostics', 'catalog reset')
          text = method(text, '_read_world_result', '''func _read_world_result(
\tworld_id: String, emit_recovery: bool, repair_primary: bool = true
) -> Dictionary:
\tif not _is_safe_id(world_id):
\t\treturn {"payload": {}, "source": "invalid_world_id", "primary_ready": false, "candidate_bytes": 0, "authoritative_bytes": 0, "repair_attempted": false}
\tvar world_path := _world_path(world_id)
\tvar result := _store.read_dictionary_validated(world_path, Callable(self, "_is_valid_world_payload").bind(world_id), repair_primary)
\tif not bool(result.get("ok", false)):
\t\treturn {"payload": {}, "source": str(result.get("source", "missing_or_invalid")), "primary_ready": false, "candidate_bytes": 0, "authoritative_bytes": 0, "repair_attempted": false}
\tvar source := str(result.get("source", "primary"))
\tvar primary_ready := source == "primary" or bool(result.get("repair_success", false))
\tif source != "primary":
\t\t_record_recovery_result(world_id, source, result, world_path)
\t\tif emit_recovery:
\t\t\tsave_recovered.emit(world_id, source)
\tvar raw_payload: Variant = result.get("data", {})
\tvar payload: Dictionary = raw_payload.duplicate(true) if raw_payload is Dictionary else {}
\treturn {
\t\t"payload": _migrate(payload),
\t\t"source": source,
\t\t"primary_ready": primary_ready,
\t\t"candidate_bytes": maxi(0, int(result.get("candidate_bytes", 0))),
\t\t"authoritative_bytes": _file_size(world_path) if primary_ready else 0,
\t\t"repair_attempted": bool(result.get("repair_attempted", false)),
\t\t"repair_success": bool(result.get("repair_success", false)),
\t}''')
          text = method(text, '_record_catalog_list', '''func _record_catalog_list(
\tworld_count: int,
\thit_count: int,
\tfallback_count: int,
\trepair_count: int,
\tdeferred_recovery_count: int,
\trepair_budget_used: int,
\tavoided_world_bytes: int,
\telapsed_usec: int
) -> void:
\t_catalog_list_count += 1
\t_catalog_hit_count += hit_count
\t_catalog_fallback_count += fallback_count
\t_catalog_repair_count += repair_count
\t_catalog_deferred_recovery_count += deferred_recovery_count
\t_last_catalog_world_count = world_count
\t_last_catalog_hit_count = hit_count
\t_last_catalog_fallback_count = fallback_count
\t_last_catalog_repair_count = repair_count
\t_last_catalog_deferred_recovery_count = maxi(0, deferred_recovery_count)
\t_last_catalog_repair_budget_used = clampi(repair_budget_used, 0, MAX_PRIMARY_REPAIRS_PER_LIST)
\t_last_catalog_avoided_world_bytes = maxi(0, avoided_world_bytes)
\t_last_catalog_elapsed_usec = maxi(0, elapsed_usec)''')
          save(path, text)

          path = 'src/ui/save_browser_panel.gd'; text = load(path)
          text = once(text, '\tvar repairs := int(diagnostics.get("last_repair_count", 0))\n', '\tvar repairs := int(diagnostics.get("last_repair_count", 0))\n\tvar deferred := maxi(0, int(diagnostics.get("last_deferred_recovery_count", 0)))\n\tvar repair_budget := maxi(0, int(diagnostics.get("primary_repair_budget", 0)))\n', 'browser diagnostics')
          text = once(text, '\tif repairs > 0:\n\t\tstatus += " · 已修复 %d 个旧目录" % repairs\n', '\tif repairs > 0:\n\t\tstatus += " · 已修复 %d 个旧目录" % repairs\n\tif deferred > 0:\n\t\tstatus += " · 待渐进修复 %d（每次最多 %d）" % [deferred, repair_budget]\n', 'browser deferred status')
          save(path, text)

          path = 'src/diagnostics/runtime_health_report_policy.gd'; text = load(path)
          text = once(text, '\t\t"last_hit_ratio": clampf(float(snapshot.get("last_hit_ratio", 0.0)), 0.0, 1.0),\n', '\t\t"last_hit_ratio": clampf(float(snapshot.get("last_hit_ratio", 0.0)), 0.0, 1.0),\n\t\t"primary_repair_budget": maxi(0, int(snapshot.get("primary_repair_budget", 0))),\n\t\t"last_deferred_recovery_count": maxi(0, int(snapshot.get("last_deferred_recovery_count", 0))),\n\t\t"last_repair_budget_used": maxi(0, int(snapshot.get("last_repair_budget_used", 0))),\n', 'health catalog projection')
          text = once(text, '\tvar repair_count := maxi(0, int(catalog.get("last_repair_count", 0)))\n', '\tvar repair_count := maxi(0, int(catalog.get("last_repair_count", 0)))\n\tvar deferred_count := maxi(0, int(catalog.get("last_deferred_recovery_count", 0)))\n\tvar repair_budget := maxi(0, int(catalog.get("primary_repair_budget", 0)))\n', 'health deferred vars')
          text = once(text, '\telif fallback_count > 0:\n\t\tseverity = 1\n\t\tissue = "世界目录本次回退 %d 个并自愈 %d 个" % [fallback_count, repair_count]\n', '\telif deferred_count > 0:\n\t\tseverity = 1\n\t\tissue = "世界目录仍有 %d 个存档待渐进修复（每次最多 %d）" % [deferred_count, repair_budget]\n\telif fallback_count > 0:\n\t\tseverity = 1\n\t\tissue = "世界目录本次回退 %d 个并自愈 %d 个" % [fallback_count, repair_count]\n', 'health deferred severity')
          text = once(text, '"命中 %d/%d · 回退 %d · 修复 %d · %.2f ms"', '"命中 %d/%d · 回退 %d · 修复 %d · 待修复 %d · %.2f ms"', 'health detail format')
          text = once(text, '\t\t\trepair_count,\n\t\t\tfloat(catalog.get("last_elapsed_milliseconds", 0.0)),\n', '\t\t\trepair_count,\n\t\t\tdeferred_count,\n\t\t\tfloat(catalog.get("last_elapsed_milliseconds", 0.0)),\n', 'health detail args')
          save(path, text)

          path = 'tests/run_all.ps1'; text = load(path)
          text = once(text, '& "$PSScriptRoot\\developer_b\\validate_save_recovery.ps1"\n', '& "$PSScriptRoot\\developer_b\\validate_save_recovery.ps1"\n& "$PSScriptRoot\\developer_b\\validate_bounded_multi_world_recovery.ps1"\n', 'validator entry')
          text = once(text, "Invoke-GodotTest 'res://tests/qa/save_recovery_regression.gd'\n", "Invoke-GodotTest 'res://tests/qa/save_recovery_regression.gd'\nInvoke-GodotTest 'res://tests/qa/bounded_multi_world_recovery_regression.gd'\n", 'headless entry')
          save(path, text)

          path = 'docs/PRODUCT_ROADMAP.md'; text = load(path)
          text = once(text, '- 多世界连续损坏、跨会话恢复和更长周期目录重建压力；\n', '- 多世界恢复采用每次最多 8 个主文件修复的渐进预算，世界始终可见，后续刷新确定性收敛；\n- 跨会话恢复和更长周期目录重建压力；\n', 'roadmap')
          save(path, text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/save/save_service.gd src/ui/save_browser_panel.gd src/diagnostics/runtime_health_report_policy.gd tests/run_all.ps1 docs/PRODUCT_ROADMAP.md
          git commit -m "perf: bound multi-world recovery per catalog scan"
          git push origin HEAD:agent/bounded-multi-world-recovery
