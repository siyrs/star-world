name: Directional ladder climbing quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: directional-ladder-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ladder-regression:
    name: Direction, support, geometry, targeting and movement regression
    runs-on: windows-latest
    timeout-minutes: 28
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate strict project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate directional ladder contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_directional_ladders.ps1

      - name: Run ladder and adjacent movement regressions
        shell: pwsh
        run: |
          $scripts = @(
            'res://tests/qa/directional_ladder_regression.gd',
            'res://tests/qa/movement_lifecycle_regression.gd',
            'res://tests/qa/non_cube_block_geometry_regression.gd',
            'res://tests/qa/placement_preview_regression.gd',
            'res://tests/qa/directional_stair_regression.gd',
            'res://tests/qa/tool_harvest_regression.gd'
          )
          foreach ($script in $scripts) {
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script $script -- --disable-update-check"
          }

  ladder-desktop:
    name: Real wall placement, climb, hold, descend, detach, save and reload
    needs: ladder-regression
    runs-on: windows-latest
    timeout-minutes: 34
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production directional ladder journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/directional_ladder_desktop_acceptance.gd' `
            -OutputPath 'build\directional-ladder-desktop.png' `
            -TimeoutMilliseconds 180000

      - name: Upload ladder visualization and runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: directional-ladder-visual-evidence-${{ github.run_number }}
          path: |
            build/directional-ladder-*.png
            build/directional-ladder-*.log
          if-no-files-found: error
          retention-days: 14
