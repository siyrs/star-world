name: Recent chunk snapshot cache quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: recent-chunk-cache-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recent-chunk-cache-regression:
    name: LRU bounds, warm hydration, unloaded patching and adjacent regressions
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate strict project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate recent chunk cache contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_recent_chunk_cache.ps1

      - name: Run recent chunk cache regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/recent_chunk_snapshot_cache_regression.gd -- --disable-update-check'

      - name: Re-run world mutation batching regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/world_mutation_batch_regression.gd -- --disable-update-check'

      - name: Re-run connected shape regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/connected_block_shapes_regression.gd -- --disable-update-check'

      - name: Re-run adaptive streaming regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/adaptive_streaming_regression.gd -- --disable-update-check'

  recent-chunk-cache-desktop:
    name: Real connected-region unload, warm reload, visualization, save and full reload
    needs: recent-chunk-cache-regression
    runs-on: windows-latest
    timeout-minutes: 58
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production repeated chunk revisit journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/recent_chunk_cache_desktop_acceptance.gd' `
            -OutputPath 'build\recent-chunk-cache-desktop.png' `
            -TimeoutMilliseconds 420000

      - name: Upload chunk cache visualization and benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recent-chunk-cache-evidence-${{ github.run_number }}
          path: |
            build/recent-chunk-cache-desktop.png
            build/recent-chunk-cache-desktop.json
            build/recent-chunk-cache-desktop.stdout.log
            build/recent-chunk-cache-desktop.stderr.log
          if-no-files-found: error
          retention-days: 14
