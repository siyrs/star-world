name: Recent chunk snapshot cache quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: recent-chunk-cache-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    # Reusable runner contract: tests/ci/Invoke-Godot.ps1 and
    # tests/ci/run_godot_desktop_test.ps1 remain the awaited execution boundaries.
    uses: ./.github/workflows/reusable-godot-quality-gate.yml
    with:
      domain_job_name: LRU bounds, warm hydration, unloaded patching and adjacent regressions
      domain_timeout_minutes: 40
      static_validators: |
        tests/developer_b/validate_recent_chunk_cache.ps1
      domain_scripts: |
        res://tests/qa/recent_chunk_snapshot_cache_regression.gd
        res://tests/qa/world_mutation_batch_regression.gd
        res://tests/qa/connected_block_shapes_regression.gd
        res://tests/qa/adaptive_streaming_regression.gd
      desktop_job_name: Real connected-region unload, warm reload, visualization, save and full reload
      desktop_timeout_minutes: 58
      desktop_script: res://tests/qa/recent_chunk_cache_desktop_acceptance.gd
      desktop_output_path: build\recent-chunk-cache-desktop.png
      desktop_timeout_milliseconds: 420000
      desktop_artifact_name: recent-chunk-cache-evidence
      desktop_artifact_paths: |
        build/recent-chunk-cache-desktop.png
        build/recent-chunk-cache-desktop.json
        build/recent-chunk-cache-desktop.stdout.log
        build/recent-chunk-cache-desktop.stderr.log
