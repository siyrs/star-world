name: Combat cadence quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: combat-cadence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  combat-cadence-regression:
    name: Combat cadence domain and UI regression
    runs-on: windows-latest
    timeout-minutes: 16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Combat cadence regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/combat_cadence_regression.gd'

  real-combat-cadence:
    name: Real combat cadence desktop acceptance
    needs: combat-cadence-regression
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise real attacks, cooldown and knockback
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/combat_cadence_desktop_acceptance.gd' `
            -OutputPath 'build\combat-cadence-desktop-acceptance.png'

      - name: Upload combat cadence evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-cadence-desktop-${{ github.run_number }}
          path: |
            build/combat-cadence-desktop-acceptance.*
          if-no-files-found: error
          retention-days: 14
