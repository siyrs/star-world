name: Run bounded multi-world recovery bootstrap

on:
  pull_request:

permissions:
  contents: write

jobs:
  run-bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bounded-multi-world-recovery
          fetch-depth: 0

      - name: Execute bootstrap and retain diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap
          import traceback

          workflow_path = Path('.github/workflows/bootstrap-bounded-multi-world-recovery.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          script = workflow.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          diagnostic = Path('docs/BOUNDED_RECOVERY_BOOTSTRAP_RESULT.txt')
          try:
              exec(compile(textwrap.dedent(script), 'bounded-recovery-bootstrap.py', 'exec'))
              diagnostic.write_text('SUCCESS\n', encoding='utf-8')
          except Exception:
              diagnostic.write_text('FAILURE\n' + traceback.format_exc(), encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/save/save_service.gd src/ui/save_browser_panel.gd src/diagnostics/runtime_health_report_policy.gd tests/run_all.ps1 docs/PRODUCT_ROADMAP.md docs/BOUNDED_RECOVERY_BOOTSTRAP_RESULT.txt
          git commit -m "perf: apply bounded multi-world recovery" || true
          git push origin HEAD:agent/bounded-multi-world-recovery
