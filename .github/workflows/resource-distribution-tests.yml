name: Resource distribution quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: resource-distribution-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resource-distribution-regression:
    name: Data contract, thresholds and generator regression
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate resource profile data
        shell: pwsh
        run: |
          .\tests\developer_b\validate_resource_distribution.ps1

      - name: Run resource distribution regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/resource_distribution_regression.gd'

  real-resource-distribution-desktop:
    name: Real map selection and production world acceptance
    needs: resource-distribution-regression
    runs-on: windows-latest
    timeout-minutes: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise map resource selection and generation
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/resource_distribution_desktop_acceptance.gd' `
            -OutputPath 'build\resource-distribution-desktop.png' `
            -TimeoutMilliseconds 110000

      - name: Upload resource distribution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-distribution-desktop-${{ github.run_number }}
          path: |
            build/resource-distribution-*.png
            build/resource-distribution-*.log
          if-no-files-found: error
          retention-days: 14
