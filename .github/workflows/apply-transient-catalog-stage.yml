name: Apply transient catalog staging patch

on:
  push:
    branches:
      - agent/transient-catalog-stage

permissions:
  contents: write

concurrency:
  group: apply-transient-catalog-stage
  cancel-in-progress: true

jobs:
  patch:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/transient-catalog-stage
          fetch-depth: 0
      - name: Apply production and acceptance patch
        shell: bash
        run: python .github/scripts/apply_transient_catalog_stage.py
      - name: Remove one-shot patch machinery
        shell: bash
        run: |
          rm .github/scripts/apply_transient_catalog_stage.py
          rm .github/workflows/apply-transient-catalog-stage.yml
      - name: Commit patched implementation
        shell: bash
        run: |
          git config user.name "star-world-agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "perf: stage catalog entries across scans"
          git push origin HEAD:agent/transient-catalog-stage
