name: Repair quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: repair-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair-runtime:
    name: Repair data and domain regression
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate repair registry
        shell: pwsh
        run: .\tests\developer_b\validate_repair.ps1

      - name: Repair transaction regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/repair_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  repair-desktop:
    name: Real repair station desktop acceptance
    needs: repair-runtime
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Repair station desktop acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/repair_desktop_acceptance.gd' `
            -OutputPath 'build\repair-desktop-acceptance.png'

      - name: Upload repair desktop evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repair-desktop-acceptance-${{ github.run_number }}
          path: |
            build/repair-desktop-acceptance.*
          if-no-files-found: warn
          retention-days: 14
