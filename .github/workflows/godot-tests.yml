name: Godot quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: godot-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-tests:
    name: Runtime and domain regressions
    runs-on: windows-latest
    timeout-minutes: 38
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Verify Godot
        shell: pwsh
        run: godot --version

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate data registry
        shell: pwsh
        run: .\tests\developer_b\validate_data.ps1

      - name: Core smoke test
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/developer_a/core_smoke_test.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Gameplay services test
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/developer_b/run_tests.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Integration regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/integration_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Input interaction regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/input_interaction_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Movement lifecycle regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/movement_lifecycle_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Physics interaction regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/physics_interaction_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Block interaction regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/block_interaction_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Furnace machine regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/furnace_machine_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Tool harvest regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/tool_harvest_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Equipment and combat regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/equipment_combat_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Desktop input contract regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/desktop_input_contract_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime diagnostics regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/runtime_diagnostics_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Player experience regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/player_experience_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Compact UI layout regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/ui_layout_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: World-region visual acceptance
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/visual_acceptance_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Adaptive streaming regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/adaptive_streaming_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Audio lifecycle regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/audio_lifecycle_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime stability regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/runtime_stability_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime lifecycle soak
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/runtime_soak_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Settings regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/settings_retest.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  desktop-acceptance:
    name: Real desktop input and UI acceptance
    needs: runtime-tests
    runs-on: windows-latest
    timeout-minutes: 28
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Desktop window acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/desktop_acceptance_regression.gd' `
            -OutputPath 'build\desktop-acceptance.png'

      - name: Furnace desktop acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/furnace_desktop_acceptance.gd' `
            -OutputPath 'build\furnace-desktop-acceptance.png'

      - name: Tool harvest desktop acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/tool_harvest_desktop_acceptance.gd' `
            -OutputPath 'build\tool-harvest-desktop-acceptance.png'

      - name: Equipment desktop acceptance
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/equipment_desktop_acceptance.gd' `
            -OutputPath 'build\equipment-desktop-acceptance.png'

      - name: Upload desktop acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-acceptance-${{ github.run_number }}
          path: |
            build/desktop-acceptance.*
            build/furnace-desktop-acceptance.*
            build/tool-harvest-desktop-acceptance.*
            build/equipment-desktop-acceptance.*
          if-no-files-found: warn
          retention-days: 14

  release-smoke:
    name: Exported Windows release smoke
    needs: desktop-acceptance
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot with export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Export and run Windows release
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\release\run_windows_export_smoke.ps1 `
            -Godot $godotPath `
            -OutputDirectory .\build\release-smoke

      - name: Upload exported release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-smoke-${{ github.run_number }}
          path: |
            build/release-smoke/**
          if-no-files-found: warn
          retention-days: 14
