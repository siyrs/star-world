name: Godot runtime tests

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: godot-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-tests:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        shell: pwsh
        run: godot --version

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate data registry
        shell: pwsh
        run: .\tests\developer_b\validate_data.ps1

      - name: Core smoke test
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/developer_a/core_smoke_test.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Gameplay services test
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/developer_b/run_tests.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Integration regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/integration_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Input interaction regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/input_interaction_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Movement lifecycle regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/movement_lifecycle_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Physics interaction regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/physics_interaction_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Block interaction regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/block_interaction_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Furnace machine regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/furnace_machine_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Desktop input contract regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/desktop_input_contract_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime diagnostics regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/runtime_diagnostics_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Player experience regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/player_experience_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Compact UI layout regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/ui_layout_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: World-region visual acceptance
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/visual_acceptance_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Adaptive streaming regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/adaptive_streaming_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Audio lifecycle regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/audio_lifecycle_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime stability regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/runtime_stability_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime lifecycle soak
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/runtime_soak_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Settings regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/settings_retest.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Desktop window acceptance
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\build | Out-Null
          godot --path . --rendering-method gl_compatibility --script res://tests/qa/desktop_acceptance_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Furnace desktop acceptance
        shell: pwsh
        run: |
          godot --path . --rendering-method gl_compatibility --script res://tests/qa/furnace_desktop_acceptance.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify desktop evidence
        shell: pwsh
        run: |
          $mainCapture = '.\build\desktop-acceptance.png'
          $furnaceCapture = '.\build\release-smoke\furnace-desktop-acceptance.png'
          foreach ($capture in @($mainCapture, $furnaceCapture)) {
            if (-not (Test-Path -LiteralPath $capture)) {
              Get-ChildItem -Recurse .\build | Select-Object FullName, Length | Format-Table -AutoSize
              throw "Desktop acceptance screenshot missing: $capture"
            }
            if ((Get-Item -LiteralPath $capture).Length -le 0) {
              throw "Desktop acceptance screenshot is empty: $capture"
            }
          }

      - name: Upload desktop acceptance evidence
        uses: actions/upload-artifact@v4
        with:
          name: desktop-acceptance-${{ github.run_number }}
          path: |
            build/desktop-acceptance.png
            build/release-smoke/furnace-desktop-acceptance.png
          if-no-files-found: error
          retention-days: 14

      - name: Exported Windows release smoke
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\release\run_windows_export_smoke.ps1 -Godot $godotPath -OutputDirectory .\build\release-smoke

      - name: Upload exported release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-smoke-${{ github.run_number }}
          path: |
            build/release-smoke/**
          if-no-files-found: warn
          retention-days: 14
