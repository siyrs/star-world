name: Machine scale runtime quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: machine-scale-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    # Reusable runner contract: tests/ci/Invoke-Godot.ps1 and
    # tests/ci/run_godot_desktop_test.ps1 remain the awaited execution boundaries.
    uses: ./.github/workflows/reusable-godot-quality-gate.yml
    with:
      domain_job_name: Active indexes, deferred automation ordering and exact completion regression
      domain_timeout_minutes: 40
      static_validators: |
        tests/developer_b/validate_machine_scale.ps1
      domain_scripts: |
        res://tests/qa/machine_scale_runtime_regression.gd
        res://tests/qa/machine_base_regression.gd
        res://tests/qa/machine_automation_regression.gd
        res://tests/qa/stonecutter_machine_regression.gd
      desktop_job_name: Real 512-machine feed, process, collect, visualization, save and reload
      desktop_timeout_minutes: 65
      desktop_script: res://tests/qa/machine_scale_desktop_acceptance.gd
      desktop_output_path: build\machine-scale-desktop.png
      desktop_timeout_milliseconds: 480000
      desktop_artifact_name: machine-scale-evidence
      desktop_artifact_paths: |
        build/machine-scale-desktop.png
        build/machine-scale-desktop.json
        build/machine-scale-desktop.stdout.log
        build/machine-scale-desktop.stderr.log
