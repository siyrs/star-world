name: Stonecutter machine quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: stonecutter-machine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stonecutter-regression:
    name: Catalog, shared scheduler, interaction router and domain regression
    runs-on: windows-latest
    timeout-minutes: 26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate stonecutter and shared machine contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_data.ps1
          .\tests\developer_b\validate_catalog_integrity.ps1
          .\tests\developer_b\validate_machine_base.ps1
          .\tests\developer_b\validate_stonecutter_machine.ps1

      - name: Run stonecutter, Machine Base and interaction regressions
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/stonecutter_machine_regression.gd'
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/machine_base_regression.gd'
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/block_interaction_regression.gd'
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/furnace_machine_regression.gd'

  real-stonecutter-desktop:
    name: Real block interaction, cross-domain processing, UI, save and reload
    needs: stonecutter-regression
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production stonecutter journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/stonecutter_machine_desktop_acceptance.gd' `
            -OutputPath 'build\stonecutter-machine-desktop.png' `
            -TimeoutMilliseconds 150000

      - name: Upload stonecutter evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stonecutter-machine-desktop-${{ github.run_number }}
          path: |
            build/stonecutter-machine-*.png
            build/stonecutter-machine-*.log
          if-no-files-found: error
          retention-days: 14
