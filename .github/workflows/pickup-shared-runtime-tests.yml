name: Shared pickup runtime quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pickup-shared-runtime-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    # Reusable runner contract: tests/ci/Invoke-Godot.ps1, run_godot_headless_test.ps1,
    # and tests/ci/run_godot_desktop_test.ps1 remain the awaited execution boundaries.
    uses: ./.github/workflows/reusable-godot-quality-gate.yml
    with:
      domain_job_name: Shared lifetime, stable anchors, resource reuse and adjacent regressions
      domain_timeout_minutes: 42
      static_validators: |
        tests/developer_b/validate_reusable_ci_workflows.ps1
        tests/developer_b/validate_pickup_stacks.ps1
        tests/developer_b/validate_pickup_shared_runtime.ps1
      primary_headless_script: res://tests/qa/pickup_shared_runtime_regression.gd
      primary_headless_output_base: build\pickup-shared-runtime-regression
      primary_headless_timeout_milliseconds: 360000
      domain_scripts: |
        res://tests/qa/pickup_stack_regression.gd
        res://tests/qa/physics_interaction_regression.gd
        res://tests/qa/runtime_stability_regression.gd
      domain_artifact_name: pickup-shared-runtime-regression
      domain_artifact_paths: |
        build/reusable-ci-static-validators.log
        build/pickup-shared-runtime-regression.stdout.log
        build/pickup-shared-runtime-regression.stderr.log
      domain_artifact_if_no_files: warn
      desktop_job_name: Real 128-pickup animation, pause, visualization, save and reload
      desktop_timeout_minutes: 62
      desktop_script: res://tests/qa/pickup_shared_runtime_desktop_acceptance.gd
      desktop_output_path: build\pickup-shared-runtime-desktop.png
      desktop_timeout_milliseconds: 420000
      desktop_artifact_name: pickup-shared-runtime-evidence
      desktop_artifact_paths: |
        build/pickup-shared-runtime-desktop.png
        build/pickup-shared-runtime-desktop.json
        build/pickup-shared-runtime-desktop.stdout.log
        build/pickup-shared-runtime-desktop.stderr.log
