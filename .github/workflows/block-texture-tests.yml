name: Block texture quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: block-textures-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  block-texture-regression:
    name: Block visual registry, atlas and chunk regression
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate block visual data
        shell: pwsh
        run: .\tests\developer_b\validate_block_visuals.ps1

      - name: Block texture regression
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --script res://tests/qa/block_texture_regression.gd'

  real-block-texture-gallery:
    name: Real textured world desktop acceptance
    needs: block-texture-regression
    runs-on: windows-latest
    timeout-minutes: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Render production texture gallery
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/block_texture_desktop_acceptance.gd' `
            -OutputPath 'build\block-texture-gallery.png' `
            -TimeoutMilliseconds 90000

      - name: Upload block texture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: block-texture-desktop-${{ github.run_number }}
          path: |
            build/block-texture-*.png
            build/block-texture-*.log
          if-no-files-found: error
          retention-days: 14
