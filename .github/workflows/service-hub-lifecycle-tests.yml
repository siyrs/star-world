name: Service hub feature lifecycle quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: service-hub-feature-lifecycle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  feature-lifecycle-regression:
    name: Dependencies, normalization, persistence and reverse cleanup
    runs-on: windows-latest
    timeout-minutes: 32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          .\tests\ci\Invoke-Godot.ps1 -Arguments '--headless --path . --editor --quit'

      - name: Validate lifecycle, husbandry, ranch and exploration contracts
        shell: pwsh
        run: |
          .\tests\developer_b\validate_service_hub_lifecycle.ps1
          .\tests\developer_b\validate_husbandry.ps1
          .\tests\developer_b\validate_husbandry_lifecycle.ps1
          .\tests\developer_b\validate_ranch.ps1
          .\tests\developer_b\validate_ranch_lifecycle.ps1
          .\tests\developer_b\validate_prospecting.ps1
          .\tests\developer_b\validate_ecology_danger.ps1
          .\tests\developer_b\validate_exploration_journal.ps1
          .\tests\developer_b\validate_exploration_rewards.ps1

      - name: Run lifecycle composition regressions
        shell: pwsh
        run: |
          $scripts = @(
            'res://tests/qa/service_hub_feature_lifecycle_regression.gd',
            'res://tests/qa/husbandry_runtime_lifecycle_regression.gd',
            'res://tests/qa/ranch_runtime_lifecycle_regression.gd'
          )
          foreach ($script in $scripts) {
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script $script"
          }

      - name: Re-run adjacent husbandry, ranch and exploration regressions
        shell: pwsh
        run: |
          $scripts = @(
            'res://tests/qa/husbandry_regression.gd',
            'res://tests/qa/ranch_products_regression.gd',
            'res://tests/qa/prospecting_regression.gd',
            'res://tests/qa/ecology_danger_regression.gd',
            'res://tests/qa/exploration_journal_regression.gd',
            'res://tests/qa/exploration_milestone_reward_regression.gd',
            'res://tests/qa/runtime_stability_regression.gd'
          )
          foreach ($script in $scripts) {
            .\tests\ci\Invoke-Godot.ps1 -Arguments "--headless --path . --script $script"
          }

  real-feature-lifecycle-desktop:
    name: Real reward notice, claim, menu, reload and failed-start acceptance
    needs: feature-lifecycle-regression
    runs-on: windows-latest
    timeout-minutes: 32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production feature lifecycle journey
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/service_hub_feature_lifecycle_desktop_acceptance.gd' `
            -OutputPath 'build\service-hub-feature-lifecycle-desktop.png' `
            -TimeoutMilliseconds 145000

      - name: Upload feature lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-hub-feature-lifecycle-desktop-${{ github.run_number }}
          path: |
            build/service-hub-feature-lifecycle-*.png
            build/service-hub-feature-lifecycle-*.log
          if-no-files-found: error
          retention-days: 14

  real-exploration-runtime-desktop:
    name: Real immediate danger, recovery, scan, unbind and reload acceptance
    needs: feature-lifecycle-regression
    runs-on: windows-latest
    timeout-minutes: 32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise production exploration runtime lifecycle
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/exploration_runtime_lifecycle_desktop_acceptance.gd' `
            -OutputPath 'build\exploration-runtime-lifecycle-desktop.png' `
            -TimeoutMilliseconds 145000

      - name: Upload exploration runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exploration-runtime-lifecycle-desktop-${{ github.run_number }}
          path: |
            build/exploration-runtime-lifecycle-*.png
            build/exploration-runtime-lifecycle-*.log
          if-no-files-found: error
          retention-days: 14
