name: First-person viewmodel quality gates

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: first-person-viewmodel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  viewmodel-regression:
    name: Held item policy, meshes and player integration
    runs-on: windows-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Validate project import
        shell: pwsh
        run: |
          godot --headless --path . --editor --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: First-person viewmodel regression
        shell: pwsh
        run: |
          godot --headless --path . --script res://tests/qa/first_person_viewmodel_regression.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  real-viewmodel-desktop:
    name: Real held item desktop acceptance
    needs: viewmodel-regression
    runs-on: windows-latest
    timeout-minutes: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Exercise mining, placement, combat, bob and UI lifecycle
        shell: pwsh
        run: |
          $godotPath = (Get-Command godot).Source
          .\tests\ci\run_godot_desktop_test.ps1 `
            -Godot $godotPath `
            -ProjectRoot . `
            -ScriptPath 'res://tests/qa/first_person_viewmodel_desktop_acceptance.gd' `
            -OutputPath 'build\first-person-viewmodel-desktop-acceptance.png' `
            -TimeoutMilliseconds 120000

      - name: Upload viewmodel evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: first-person-viewmodel-desktop-${{ github.run_number }}
          path: |
            build/first-person-viewmodel-*.png
            build/first-person-viewmodel-*.log
          if-no-files-found: error
          retention-days: 14
